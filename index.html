  .hero::after{
    content:"";position:absolute;inset:0;z-index:0;pointer-events:none;
    background-image:linear-gradient(100deg, var(--bg) 0%, rgba(15,23,32,.94) 30%, rgba(15,23,32,.64) 54%, rgba(15,23,32,.28) 76%, rgba(15,23,32,.10) 100%);
  }
  .header-row{position:relative;z-index:1;display:flex;align-items:flex-start;gap:12px;}
  .dept-badge{width:42px;height:auto;flex:none;margin-top:2px;filter:drop-shadow(0 2px 8px rgba(0,0,0,0.45));}
  .header-text{flex:1;min-width:0;}
  .eyebrow{
    font-size:11px;letter-spacing:.14em;color:var(--flow);
    text-transform:uppercase;font-weight:700;margin-bottom:4px;position:relative;z-index:1;
  }
  header h1{font-size:18px;font-weight:700;line-height:1.4;color:var(--text);text-shadow:0 1px 6px rgba(0,0,0,.45);}
  header .sub{font-size:12px;color:var(--text-dim);margin-top:4px;}
  .searchwrap{margin-top:12px;position:relative;z-index:1;}
  #search{
    width:100%;padding:11px 14px 11px 38px;border-radius:10px;
    border:1px solid rgba(255,255,255,.14);background:rgba(15,23,32,.55);
    color:var(--text);font-size:15px;outline:none;backdrop-filter:blur(2px);
  }
  #search:focus{border-color:var(--tech);}
  .searchwrap svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);opacity:.5;}
  @media (max-width:720px){
    header{padding:0;}
    .hero{border-radius:0;padding:16px 16px 12px;}
    .dept-badge{width:36px;}
    header h1{font-size:16.5px;}
    .hero::before{
      /* 貼齊右上；垂直裁切至右側人物頭頂；左側維持 1/3 淡入 */
      top:0;right:0;bottom:0;left:auto;
      width:min(300px, 68%);
      background-position:right -52px top -28px;
      background-size:auto 210px;
      background-repeat:no-repeat;
      -webkit-mask-image:linear-gradient(90deg, transparent 0%, #000 33%, #000 100%);
      mask-image:linear-gradient(90deg, transparent 0%, #000 33%, #000 100%);
    }
    .backbar{padding-left:16px;padding-right:16px;}
  }
  @media (min-width:721px){
    .hero::before{
      /* 圖只佔右側區塊，mask 才會作用在「圖片左緣 1/3」而非整列寬度 */
      inset:0 0 0 auto;
      width:min(480px, 52%);
      background-position:right top;
      background-size:auto 260px;
      background-repeat:no-repeat;
      -webkit-mask-image:linear-gradient(90deg, transparent 0%, #000 33%, #000 100%);
      mask-image:linear-gradient(90deg, transparent 0%, #000 33%, #000 100%);
    }
  }


  main{max-width:720px;margin:0 auto;padding:16px 16px 60px;}

  /* ---- breadcrumb / back（釘在 sticky header 內，捲動時仍可點） ---- */
  .backbar{
    display:none;align-items:center;gap:8px;
    max-width:720px;margin:0 auto;padding:10px 16px 12px;
    font-size:14px;color:var(--text-dim);cursor:pointer;user-select:none;
    background:var(--bg);
  }
  .backbar.show{display:flex;}
  .backbar:active{opacity:.6;}

  /* ---- Home category cards ---- */
  .cat-grid{display:flex;flex-direction:column;gap:12px;margin-top:6px;}
  .cat-card{
    border:1px solid var(--line);border-radius:var(--radius);
    padding:16px 16px;display:flex;align-items:center;gap:14px;
    cursor:pointer;background:var(--surface);transition:transform .15s, border-color .15s;
  }
  .cat-card:active{transform:scale(0.98);}
  .cat-card .icon{
    width:44px;height:44px;border-radius:10px;flex:none;
    display:flex;align-items:center;justify-content:center;font-size:20px;
  }
  .cat-card.tech{border-left:3px solid var(--tech);} .cat-card.tech .icon{background:var(--tech-bg);color:var(--tech);}
  .cat-card.drug{border-left:3px solid var(--drug);} .cat-card.drug .icon{background:var(--drug-bg);color:var(--drug);}
  .cat-card.flow{border-left:3px solid var(--flow);} .cat-card.flow .icon{background:var(--flow-bg);color:var(--flow);}
  .cat-card.guide{border-left:3px solid var(--guide);} .cat-card.guide .icon{background:var(--guide-bg);color:var(--guide);}
  .cat-card .body{flex:1;}
  .cat-card .name{font-size:16px;font-weight:700;}
  .cat-card .desc{font-size:12.5px;color:var(--text-faint);margin-top:2px;}
  .cat-card .count{font-size:12px;color:var(--text-dim);}
  .cat-card .chev{color:var(--text-faint);}

  .legend{
    margin-top:22px;padding:14px;border:1px dashed var(--line);border-radius:12px;
    font-size:12.5px;color:var(--text-dim);line-height:1.9;
  }
  .legend b{color:var(--text);}
  .legend-row{display:flex;align-items:center;}
  .legend-row + .legend-row{margin-top:6px;}
  .legend-icon{display:inline-flex;align-items:center;justify-content:center;flex:0 0 34px;width:34px;}
  .legend-icon .pill{margin-right:0;}
  .legend-icon .p-badge{margin-right:0;}
  .pill{display:inline-flex;align-items:center;gap:4px;padding:1px 8px;border-radius:20px;font-size:11px;font-weight:600;margin-right:4px;}
  .pill.need{background:rgba(224,149,79,.15);color:var(--need);}
  .pill.noneed{background:rgba(63,176,138,.15);color:var(--noneed);}

  /* ---- item list ---- */
  .section-title{font-size:13px;color:var(--text-faint);letter-spacing:.06em;margin:22px 0 10px;text-transform:uppercase;}
  .section-title:first-child{margin-top:0;}
  .item-list{display:flex;flex-direction:column;gap:8px;}
  .item-card{
    border:1px solid var(--line);border-radius:12px;padding:13px 14px;
    background:var(--surface);cursor:pointer;display:flex;justify-content:space-between;align-items:center;gap:10px;
  }
  .item-card:active{background:var(--surface-2);}
  .item-card .t{font-size:15px;font-weight:600;}
  .item-card .en{font-size:11.5px;color:var(--text-faint);margin-top:2px;}
  .item-card .n{font-size:11px;color:var(--text-dim);white-space:nowrap;}
  .code-chip{
    display:inline-block;font-size:11px;font-weight:800;font-family:"IBM Plex Mono",monospace;
    padding:1px 7px;border-radius:6px;margin-right:8px;vertical-align:1px;
  }
  .code-chip.dept-m{background:rgba(79,157,222,.16);color:var(--tech);}
  .code-chip.dept-t{background:rgba(226,87,76,.16);color:var(--alert);}
  .code-chip.dept-s{background:rgba(224,149,79,.16);color:var(--flow);}

  /* ---- detail ---- */
  .detail-head{margin-bottom:16px;}
  .detail-head h2{font-size:21px;color:var(--text);}
  .detail-head .en{font-size:13px;color:var(--text-faint);margin-top:3px;font-family:"IBM Plex Mono",monospace;}

  .tabbar{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin:14px 0 16px;scrollbar-width:none;}
  .tabbar::-webkit-scrollbar{display:none;}
  .tab{
    flex:none;padding:8px 13px;border-radius:20px;font-size:13px;
    border:1px solid var(--line);color:var(--text-dim);cursor:pointer;white-space:nowrap;
  }
  .tab.active{background:var(--surface-3);color:var(--text);border-color:var(--text-faint);font-weight:600;}

  .meta-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;}
  .meta-chip{font-size:11.5px;padding:4px 10px;border-radius:20px;background:var(--surface-2);color:var(--text-dim);border:1px solid var(--line);}

  .card{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:15px 16px;margin-bottom:12px;}
  .card h4{font-size:13.5px;color:var(--text-dim);margin-bottom:8px;font-weight:700;letter-spacing:.02em;}
  .card p{margin:0 0 6px;font-size:14.5px;line-height:1.75;color:var(--text);}
  .card ul{margin:0;padding-left:20px;}
  .card li{font-size:14.5px;line-height:1.8;color:var(--text);margin-bottom:3px;}
  .card.dose{border-left:3px solid var(--drug);}
  .card.contra{border-left:3px solid var(--alert);}
  .card.contra h4{color:var(--alert);}
  .card.triage-red{border:2px solid var(--alert);padding-top:0;overflow:hidden;}
  .card.triage-red h4{background:var(--alert);color:#fff;font-weight:800;padding:10px 16px;margin:0 -16px 12px;letter-spacing:.02em;}
  .card.triage-yellow{border:2px solid #e0b429;padding-top:0;overflow:hidden;}
  .card.triage-yellow h4{background:#e0b429;color:#1b1500;font-weight:800;padding:10px 16px;margin:0 -16px 12px;letter-spacing:.02em;}

  .badge-online{
    display:inline-flex;align-items:center;gap:6px;font-size:12.5px;font-weight:700;
    padding:5px 12px;border-radius:20px;margin-bottom:14px;
  }
  .badge-online.need{background:rgba(224,149,79,.15);color:var(--need);}
  .badge-online.noneed{background:rgba(63,176,138,.15);color:var(--noneed);}

  .med-director{
    display:flex;align-items:center;justify-content:space-between;gap:10px;
    background:var(--surface);border:1px solid var(--line);border-radius:12px;
    padding:12px 14px;margin-bottom:14px;
  }
  .med-director-label{font-size:11px;color:var(--text-faint);letter-spacing:.04em;}
  .med-director-name{font-size:15.5px;font-weight:700;color:var(--text);}
  .med-director-unit{font-size:12.5px;color:var(--text-dim);margin-top:4px;line-height:1.4;}
  .med-director-call{
    display:flex;align-items:center;gap:6px;flex:none;
    background:var(--drug-bg);color:var(--drug);border:1px solid var(--drug);
    border-radius:20px;padding:7px 14px;font-size:13px;font-weight:700;
    cursor:pointer;user-select:none;transition:transform .1s;
  }
  .med-director-call:active{transform:scale(0.95);background:var(--drug);color:#fff;}
  .med-dir-list{display:flex;flex-direction:column;gap:10px;}
  .med-dir-card{margin:0;}

  /* ---- flowchart / decision-tree graph ---- */
  .flow-graph{display:flex;flex-direction:column;align-items:center;margin-top:10px;}
  .fg-pill{
    font-size:11.5px;font-weight:800;letter-spacing:.06em;color:var(--text-faint);
    border:1px solid var(--line);border-radius:20px;padding:4px 14px;margin-bottom:2px;
  }
  .fg-arrow{width:2px;height:22px;background:var(--line);position:relative;flex:none;}
  .fg-arrow::after{
    content:"";position:absolute;left:50%;bottom:-1px;transform:translateX(-50%);
    border-left:5px solid transparent;border-right:5px solid transparent;border-top:7px solid var(--line);
  }
  .fg-arrow.small{height:14px;}

  .fg-action{
    max-width:440px;width:100%;background:var(--surface);border:1.5px solid var(--line);
    border-radius:10px;padding:14px 18px;text-align:center;font-size:14.5px;line-height:1.68;color:var(--text);
  }
  .fg-decision{
    max-width:360px;width:92%;background:var(--flow-bg);border:1.6px solid var(--flow);
    clip-path:polygon(8% 0%,92% 0%,100% 22%,100% 78%,92% 100%,8% 100%,0% 78%,0% 22%);
    padding:24px 32px;text-align:center;font-size:14.5px;font-weight:700;line-height:1.55;color:var(--text);
  }
  .fg-branches{
    display:flex;gap:16px;justify-content:center;align-items:flex-start;width:100%;
    margin:6px 0 0;flex-wrap:wrap;
  }
  .fg-branch{flex:1;min-width:150px;max-width:270px;display:flex;flex-direction:column;align-items:center;}
  .fg-branch.is-lane{max-width:320px;}
  .fg-branch-lane{
    display:flex;flex-direction:column;align-items:center;width:100%;
    background:rgba(224,149,79,.06);border:1px dashed var(--line);
    border-radius:12px;padding:12px 10px;gap:0;
  }
  .fg-branch-lane .fg-action{max-width:100%;font-size:13.5px;padding:11px 13px;}
  .fg-branch-lane .fg-decision{max-width:100%;width:96%;padding:16px 18px;font-size:13.5px;}
  .fg-branch-lane .fg-branches{margin-top:4px;}
  .flow-light-page .fg-branch-lane{background:rgba(224,149,79,.05);border-color:#d7dde2;}
  .fg-branch-label{font-size:11px;font-weight:800;padding:3px 12px;border-radius:20px;margin-bottom:0;white-space:nowrap;}
  .fg-branch-label.yes{background:rgba(63,176,138,.18);color:var(--noneed);}
  .fg-branch-label.no{background:rgba(226,87,76,.18);color:var(--alert);}
  .fg-branch-label.neutral{background:rgba(147,167,181,.18);color:var(--text-dim);}
  .fg-outcome{
    border-radius:10px;padding:12px 14px;font-size:13.5px;line-height:1.65;color:var(--text-dim);
    text-align:center;width:100%;background:var(--surface);
  }
  .fg-outcome.is-leaf{border:1.5px dashed var(--line);}
  .fg-outcome.is-continue{border:1.5px solid var(--tech);color:var(--text);}
  .fg-outcome:empty{display:none;}
  .fg-continue-tag{margin-top:6px;font-size:11px;color:var(--tech);font-weight:800;letter-spacing:.02em;}
  .p-badge{display:inline-block;font-size:10.5px;font-weight:800;color:#fff;background:var(--tech);border-radius:4px;padding:0 5px;margin-right:5px;vertical-align:1px;}

  .notes{margin-top:20px;}
  .notes h4{font-size:13px;color:var(--text-faint);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;}
  .note-item{font-size:13px;color:var(--text-dim);line-height:1.8;margin-bottom:10px;padding-left:14px;border-left:2px solid var(--line);}
  .note-item b{color:var(--text-dim);}

  /* ---- flowchart white page mode ---- */
  .flow-light-page{
    background:#ffffff;color:#1b2733;border-radius:16px;
    padding:20px 16px 28px;margin:0 -2px;
    box-shadow:0 1px 2px rgba(0,0,0,.04), 0 8px 24px rgba(0,0,0,.28);
  }
  .flow-light-page .detail-head h2{color:#10202c;}
  .flow-light-page .meta-chip{background:#eef1f4;color:#4d5b66;border-color:#dee3e8;}
  .flow-light-page .card{background:#f5f7f9;border-color:#dee3e8;color:#1b2733;}
  .flow-light-page .card h4{color:#5a6771;}
  .flow-light-page .card p,
  .flow-light-page .card li{color:#1b2733;}
  .flow-light-page .fg-pill{color:#5a6771;border-color:#d7dde2;}
  .flow-light-page .fg-arrow{background:#c6ccd2;}
  .flow-light-page .fg-arrow::after{border-top-color:#c6ccd2;}
  .flow-light-page .fg-action{background:#f5f7f9;border-color:#d7dde2;color:#1b2733;}
  .flow-light-page .fg-decision{background:#fdf1e2;border-color:#d98a3f;color:#1b2733;}
  .flow-light-page .fg-branch-label.yes{background:#e2f5ee;color:#1c8264;}
  .flow-light-page .fg-branch-label.no{background:#fdeae8;color:#c14337;}
  .flow-light-page .fg-branch-label.neutral{background:#eef1f4;color:#4d5b66;}
  .flow-light-page .fg-outcome{background:#f5f7f9;color:#3d4a54;}
  .flow-light-page .fg-outcome.is-leaf{border-color:#d7dde2;}
  .flow-light-page .fg-outcome.is-continue{border-color:#3f8fd1;color:#1b2733;}
  .flow-light-page .fg-continue-tag{color:#2f7cbe;}
  .flow-light-page .notes h4{color:#8a95a0;}
  .flow-light-page .note-item{color:#4d5b66;border-left-color:#d7dde2;}
  .flow-light-page .p-badge{background:#3f8fd1;}
  .flow-light-page .subflow-divider{
    display:flex;align-items:center;gap:10px;margin:30px 0 16px;
    font-size:12.5px;font-weight:800;color:#8a6a3a;letter-spacing:.04em;
  }
  .flow-light-page .subflow-divider::before,
  .flow-light-page .subflow-divider::after{content:"";flex:1;height:1px;background:#e7c99a;}

  .detail-head-row{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap;}
  .med-director-mini{
    flex:none;display:flex;align-items:center;gap:8px;
    background:var(--surface);border:1px solid var(--line);border-radius:10px;
    padding:8px 10px;
  }
  .mdm-label{font-size:9.5px;color:var(--text-faint);letter-spacing:.03em;}
  .mdm-name{font-size:13px;font-weight:700;color:var(--text);}
  .mdm-unit{font-size:11px;color:var(--text-dim);margin-top:2px;line-height:1.35;}
  .mdm-call{
    display:flex;align-items:center;gap:4px;flex:none;
    background:var(--drug-bg);color:var(--drug);border:1px solid var(--drug);
    border-radius:16px;padding:5px 10px;font-size:11.5px;font-weight:700;
    cursor:pointer;user-select:none;transition:transform .1s;
  }
  .mdm-call:active{transform:scale(0.95);background:var(--drug);color:#fff;}
  .flow-light-page .med-director-mini{background:#f5f7f9;border-color:#dee3e8;}
  .flow-light-page .mdm-label{color:#8a95a0;}
  .flow-light-page .mdm-name{color:#1b2733;}
  .flow-light-page .mdm-unit{color:#4d5b66;}
  .flow-light-page .mdm-call{background:#e6f4f1;color:#1c8264;border-color:#1c8264;}
  .flow-light-page .mdm-call:active{background:#1c8264;color:#fff;}

  .empty{text-align:center;color:var(--text-faint);padding:60px 20px;font-size:14px;}

  /* ---- Footer / unit credit ---- */
  .site-footer{
    max-width:720px;margin:8px auto 0;padding:24px 16px 40px;
    display:flex;flex-direction:column;align-items:center;gap:2px;
    border-top:1px solid var(--line);
  }
  .squad-logo{width:105px;height:auto;opacity:0.95;display:block;}
  .footer-caption{font-size:11px;color:var(--text-faint);letter-spacing:.1em;text-transform:uppercase;margin-top:0;}
  .footer-citation{font-size:11.5px;color:var(--text-dim);line-height:1.7;text-align:center;margin-bottom:8px;}

  ::selection{background:var(--tech);color:#fff;}
</style>
</head>

  {id:'tech-us', name:'手持式超音波', en:'Point-of-care Ultrasound', scenarios:[
    {title:'延伸式創傷重點超音波評估（E-FAST）', approved:'115年', online:'no', sections:[
      {h:'啟動條件', list:['創傷傷病患或懷疑高能量創傷機轉。','作為啟動高級救護技術員預立醫療流程之佐證檢查（例：TXA）。','判讀之高級救護技術員通過消防局之操作認證。']},
      {h:'操作注意事項', p:['救護技術員應權衡現場救護能量以及後送距離、時間，以傷病患最大福祉為考量，決定是否執行此技術。']}
    ]}
  ]},
  {id:'tech-dsed', name:'雙重接續去顫（DSED）', en:'Double Sequential Defibrillation', scenarios:[
    {title:'成人心肺功能停止情境', approved:'115年', online:'no', sections:[
      {h:'適應症（需同時符合）', list:['心肺功能停止狀態。','心室心律不整連續3次去顫仍未矯正（refractory ventricular arrhythmias）。']},
      {h:'使用方式', list:['準備第2台AED或手動去顫器。','貼片黏貼：去顫器A採前方－側邊（側邊貼片於腋中線上、腋窩下方）；去顫器B採前方－背側（前方貼片於胸骨左側，避開胸部組織；後方貼片同高度，中心靠近左肩胛骨內側）。','注意貼片間不可互相接觸。','確認無人接觸傷病患，且組員預備完成。','依序使用去顫器A去顫，接著使用去顫器B去顫，間隔應≦1秒。']},
      {h:'備註', p:['執行之救護紀錄由醫療指導醫師簽核。']}
    ]}
  ]}
],
guidelines: [
  {id:'tech-geriatric-comm', name:'老年病人溝通技巧', en:'Communicating with Geriatric Patients', scenarios:[
    {title:'聽力與視力障礙病人溝通技巧', approved:'113年12月（新教材）', online:'no', sections:[
      {h:'視力障礙溝通要點', p:['若老年病人失明，不應假設他們也聾了；任何處置前都應向病人說明，可讓病人觸摸並解釋要使用的儀器與器材來幫助救護進行，並注意移動時跌倒的風險。']},
      {h:'聽力障礙溝通技巧', list:['詢問是否有助聽器，以及是否需要使用。','溝通時面對病人並保持適當距離，儘量減少背景噪音。','儘量讓光線打在救護技術員臉上而非站在背光處，並在病人可見的高度及位置對話。','用正常速度說話，除非觀察到病人有不理解的情況；可以比平常稍微大聲，但不是用吼的。','用簡短的句子，避免使用太長的對話；被誤解的內容可以重新換句話說。','聽力障礙者若沒有助聽器，可嘗試逆向使用聽診器來幫助溝通。']}
    ]},
    {title:'失語症病人溝通技巧', approved:'113年12月（新教材）', online:'no', sections:[
      {h:'判斷困難類型', list:['先詢問家人或照顧者，病人是說話困難還是聆聽困難。','聆聽困難者，可運用環境素材引導，利用呈現給病人看和理解的方式來告訴病人希望做到什麼。','說話困難者，可用簡單的是非題方式輔助溝通。']},
      {h:'溝通原則', list:['對話要如同跟成人一樣，避免顯露出高人一等的樣子。','避免開放式問句，使用聚焦的問題，並減少背景雜音。','給予病人足夠時間去說，也允許合理的回應時間，不要堅持病人把每一個字句說好。','採取簡單明瞭的方式溝通：簡單的句子、放慢語速、保持正常音量，並在關鍵字句時加重語氣。','儘量利用姿勢、手勢及視覺輔助促進溝通；病人感覺羞愧或被催促時會減少溝通嘗試，聆聽時應避免不耐煩或糾正的態度。']}
    ]},
    {title:'失智症病人溝通技巧', approved:'113年12月（新教材）', online:'no', sections:[
      {h:'溝通原則', list:['使用清楚、具體以及病人熟悉的語言，一次講一件事，用語簡單且不要太快，避免使用專業術語。','使用簡短的句子；若病人不理解，先重複同樣的問題一次，仍不理解才用換句話說或替換字詞。','使用手勢、姿勢等方式搭配所說的內容；若病人回答中思緒中斷，可重複他最後說的話作為提示。','解釋為什麼要這麼做時不要給予冗長的解釋，可能會導致病人無法理解。','用「名詞」取代「代名詞」（例如用具體姓名取代「他」），避免病人分心去思考代名詞是指誰。']}
    ]}
  ]},
  {id:'tech-geriatric-trauma', name:'老年病人評估與外傷固定技巧', en:'Geriatric Assessment and Immobilization', scenarios:[
    {title:'老人評估與外傷風險辨識', approved:'113年12月（新教材）', online:'no', sections:[
      {h:'評估原則', p:['評估老年族群應考量整體面向：年紀增加本身不會導致心智狀態變差，不應輕易假設老年病人意識改變或反應不佳是正常的，可藉由對人、事、地、時間的定向評估是否有認知功能障礙。老年人痛覺退化，心絞痛可能只表現在頸部或下巴而無典型胸痛；評估呼吸道時操作壓額抬顎法應更溫和，因頸椎及下巴骨骼因老化變得脆弱，應優先採用下顎推舉法。']},
      {h:'老年常見外傷風險', list:['頸椎及脊椎外傷：骨質疏鬆使脊椎變得脆弱，單純摔倒也可能造成頸椎骨折。','髖關節骨折：常發生於年老合併骨質疏鬆之女性病人，從站姿跌倒的情境。','肋骨骨折及連枷胸：可能因用藥缺乏休克代償表現，容易低估內出血狀況。','肢體評估可運用對稱法則，比較兩側肢體是否對稱、變形、瘀青來辨別是否為外傷所致。']}
    ]},
    {title:'頸椎減移與駝背固定技巧', approved:'113年12月（新教材）', online:'no', sections:[
      {h:'頸椎減移', list:['老年病人可能無法使用標準頸圈，或無法順利牽引頭部到身體自然中線，可嘗試用簡單的毛毯包圍住病人頭部以限制其移動。','固定病人時，在束帶接觸的地方墊一些紗布可避免皮膚損傷。']},
      {h:'駝背固定', list:['遇到駝背的病人，可試著以毛毯或枕頭提供頭部與上背部的支撐，不要嘗試或強迫駝背病人躺平。','移到長背板前可用軟墊形成緩衝，減少骨頭凸起處的皮膚壓力，避免產生壓瘡。']}
    ]},
    {title:'髖骨骨折固定技巧', approved:'113年12月（新教材）', online:'no', sections:[
      {h:'固定方式', list:['不需要嘗試使用牽引類型的固定，可考慮使用毛毯、長夾板固定，毛毯應置於兩腿間並以原姿勢固定。','可考慮使用長背板或鏟式擔架，運送過程中仍要持續評估末梢肢體狀況。']}
    ]}
  ]},
  {id:'tech-elder-abuse', name:'老年病人虐待辨識', en:'Recognizing Elder Abuse', scenarios:[
    {title:'老人虐待辨識與通報', approved:'113年12月（新教材）', online:'no', sections:[
      {h:'定義與高風險因子', p:['依世界衛生組織定義，老人虐待是指在信任關係中發生的單一或重複性行為，包含作為或不作為所造成的傷害，導致老年人身心受創或權益受損。高風險因子包括功能性依賴或身心障礙、身體健康狀況不佳、認知功能障礙及精神健康問題；照顧者患有精神疾病或物質濫用問題也可能對老年人造成危害。']},
      {h:'虐待形式與辨識重點', list:['身體虐待：與病史不符的外傷、瘀傷，無法解釋的骨折或傷痕。','情緒或心理虐待：病人情緒異常緊張或莫名恐懼，與主要照顧者互動時的異常情緒反應。','疏忽照顧或遺棄：明顯營養不良跡象，個人衛生狀況不佳。','性虐待：生殖器或肛門等私密部位傷害，有性傳染疾病的症狀出現。','財務剝削：生活品質與經濟狀況不符或與主要照顧者落差很大，重要財物莫名消失。']},
      {h:'法源依據', p:['依老人福利法第41條第1項規定：老人因配偶、直系血親卑親屬或依契約負照顧義務之人有疏忽、虐待、遺棄或其他情事，致其生命、身體、健康或自由發生危難者。']}
    ]}
  ]},
  {id:'tech-geriatric-tubes', name:'老年病人常見管路照護與到院前緊急狀況', en:'Geriatric Home-care Devices', scenarios:[
    {title:'鼻胃管', approved:'113年12月（新教材）', online:'no', sections:[
      {h:'使用目的', p:['協助無法自行進食的病人維持營養與水分攝取。']},
      {h:'到院前緊急狀況', list:['管路意外滑脫或阻塞：可能無法獲得足夠營養、電解質失衡，更可能引發嘔吐或造成吸入性肺炎。','灌食過程發生嗆咳、呼吸困難：應立即停止灌食，迅速評估呼吸狀況，必要時給予氧氣並將鼻胃管打開引流減壓。','管路周圍皮膚發紅、腫脹或有分泌物：可能為感染徵兆，需注意觀察並記錄。']}
    ]},
    {title:'導尿管', approved:'113年12月（新教材）', online:'no', sections:[
      {h:'使用目的', p:['協助無法自行排尿的病人順利排出尿液。']},
      {h:'到院前緊急狀況', list:['尿管阻塞：可能導致尿液滯留、膀胱漲痛，甚至引發泌尿道感染。','尿管意外脫落：應避免逕行插回造成二次傷害，並儘速將病人送醫處理。','血尿或混濁尿液：可能為感染或其他泌尿系統疾病徵兆，需詳細記錄並告知醫護人員。']}
    ]},
    {title:'氣切管', approved:'113年12月（新教材）', online:'no', sections:[
      {h:'使用目的', p:['協助呼吸道阻塞或呼吸衰竭的病人維持呼吸道通暢。']},
      {h:'到院前緊急狀況', list:['氣切管脫落：屬極度緊急狀況，應立即嘗試通氣並儘速送醫。','呼吸困難、發紺：可能為痰液阻塞、氣胸或其他呼吸道問題，需評估呼吸狀況，必要時使用小兒面罩或NRM給予氧氣，或考慮使用抽痰機抽痰。','若抽吸時氣切管完全阻塞且正壓給氧完全無法給氣，必要時可將氣囊裡的水或空氣抽出；若有氣切內管，可請家屬先行移除內管（非整組氣切管），若無法立即排除相關問題，建議儘早送醫。','氣切造口出血：應使用乾淨敷料加壓止血並儘速送醫。']},
      {h:'注意事項', p:['切勿將任何氧氣接頭（如一般面罩氧氣接頭）嘗試放入或接上氣切管。']}
    ]},
    {title:'造口', approved:'113年12月（新教材）', online:'no', sections:[
      {h:'使用目的', p:['協助無法經口進食的病人維持營養與水分攝取（如胃造瘻）或提供排泄途徑，例如結腸造口或迴腸造口。']},
      {h:'到院前緊急狀況', list:['造口周圍皮膚發紅、腫脹、疼痛或有分泌物：可能為感染徵兆。','造口出血：使用乾淨敷料加壓止血並儘速送醫。','造口脫垂：不可嘗試將脫垂的腸段推回，應以濕潤的紗布覆蓋並儘速送醫。','造口阻塞：可能導致腹痛、嘔吐等症狀，需送醫處理。']}
    ]},
    {title:'洗腎瘻管', approved:'113年12月（新教材）', online:'no', sections:[
      {h:'使用目的', p:['提供血液透析所需的血流管路，適用於腎衰竭病人。']},
      {h:'到院前緊急狀況', list:['出血：若瘻管處出血，應立即加壓止血並送醫。','感染：若出現紅、腫、熱、痛或膿液，需立即就醫。','瘻管阻塞：可能導致手部腫脹、疼痛，需就醫處理；居家可每日觸摸感受震顫（Thrill）或聽診血管雜音（Bruit）判斷是否通暢。']}
    ]}
  ]},
  {id:'tech-behavioral-assessment', name:'精神危機評估與言語降階技巧', en:'Crisis Assessment and Verbal De-escalation', scenarios:[
    {title:'初步評估口訣（叫叫CABD）', approved:'113年12月（新教材）', online:'no', sections:[
      {h:'口訣內容', list:['叫：叫團隊，聯絡警察與衛生單位。','叫：叫周邊、叫裝備，確認環境淨空、管理圍觀者、確認防護裝備充足。','C（Cognition）：認知，確認病人是否思想怪異、脫離現實。','A（Affection）：情緒，評估病人情緒是否高漲、憤怒、焦躁、恐懼、害怕等。','B（Behavior）：行為，評估是否有異常舉動或立即的危險行為。','D（Decide and DEFUSE）：決定壓制或降階，進行言語降階，或是保護性約束。']},
      {h:'備註', p:['無法言語對接、情緒高漲處於危機階段，或是有立即危險行為的病人，應開始規劃壓制的計畫，並隨時運用團隊資源與現場夥伴溝通、預定替代方案。']}
    ]},
    {title:'言語降階技巧（DEFUSE）', approved:'113年12月（新教材）', online:'no', sections:[
      {h:'口訣內容', list:['D（Decide）：選擇策略，選擇適合言語降階的情境。','E（Ensure Safety）：確保安全，確保自身安全。','F（Form Relationship）：建立關係，建立信任關係。','U（Utilize Interests）：善用需要，了解病人的需要。','S（Set Limits）：設下界限，設下會談界線。','E（Enforce/Evaluate）：重新評估，隨時重新評估。']},
      {h:'備註', p:['中文口訣為「選擇安全關係，需要界限評估」，可用於有效穩定病人情緒、減少潛在暴力衝突、確保所有人安全，並促使病人配合就醫。']}
    ]},
    {title:'空間環境與氛圍判斷', approved:'113年12月（新教材）', online:'no', sections:[
      {h:'空間環境考量', list:['門：進門前敲門並表明身份後，應遠離門邊站在安全處，避免站在門旁或正對門口，房間內門若半開應引導病人移至客廳。','窗：2樓以上需注意病人情緒激動可能跳窗，應引導病人遠離窗戶進行對話。','走廊與樓梯：確保緊急狀況時有足夠的撤離空間，避免雜物阻礙，並了解出入口數量以防病人離開。']},
      {h:'氛圍的判斷', list:['味道：如酒味、毒品氣味或瓦斯味。','聲音：負面情緒，如爭執、怒吼、哭泣等。','光線：光源不足時應放慢行動，尋找燈源或使用手電筒。']}
    ]},
    {title:'次級評估口訣（居安思危、枕戈待旦）', approved:'113年12月（新教材）', online:'no', sections:[
      {h:'使用時機', p:['適用於病人無立即危險時，做更完整的資訊蒐集，以判斷是否需要強制護送就醫、進行後續團隊資訊交接，並確保護送就醫流程的安全；8個項目在操作上沒有固定順序。']},
      {h:'口訣內容', list:['居（居住環境）：留意門、窗、走廊、樓梯等空間動線是否有介入與撤離的餘裕，例如避免正對門口、引導病人遠離窗邊等。','安（個人安全）：確保現場和周邊的個人安全，綜合氛圍、味道、聲音、光線等線索判斷風險。','思（思想症狀）：評估病人是否有思想怪異或急性精神症狀，如幻覺、妄想、脫離現實等表現。','危（相信直覺）：若感覺到危險，應相信直覺，必要時先行撤離、保持距離並重新規劃接觸方式。','枕（過去病史）：詢問病人有無過去精神病診斷病史，以及先前處置是否有效。','戈（武器藥物）：確認病人是否持有武器，或有無藥物濫用、中毒情形。','待（對待關係人）：觀察病人如何對待家屬等重要關係人，作為研判風險與擬定溝通策略的參考。','旦（緊急計畫）：一旦現場情緒升溫，應預先擬定緊急撤離與求援的備援計畫，並與其他職類協調好。']}
    ]}
  ]},
  {id:'tech-behavioral-team', name:'精神危機處理團隊分工與約束作業程序', en:'Crisis Team Coordination and Restraint Procedure', scenarios:[
    {title:'團隊資源管理（TRM）', approved:'113年12月（新教材）', online:'no', sections:[
      {h:'領導', p:['CIT團隊最重要的任務目標是「安全」，需各職類做好分工並有明確的領導者，建議由1位救護同仁發號施令，來自警察、救護、衛生單位的領導者需一同擬定處置計畫及溝通協調。']},
      {h:'溝通', p:['良好溝通可提升團隊人員的安全、效率、士氣，須確保彼此有效傾聽，並有效傳遞和管理資訊和資源，例如「尊重邀請、表達訴求」、「緩和態度、明確指令」、「大聲通報、回覆確認」等技巧。']},
      {h:'守望', p:['守望即相互照應幫忙，需包含病人、組員、環境、進度4個面向；救護中可採用「接觸與掩護」原則，一人擔任接觸者與病人交涉評估，另一人擔任掩護者蒐集資訊並確保撤退動線暢通。']},
      {h:'相助', p:['以團隊合作共同解決問題，夥伴間應互相幫忙、對事不對人、和緩溝通，並主動發揮自身專業或請求支援；互相提醒鼓勵，隨時提醒可能的風險或不當行為。']}
    ]},
    {title:'約束流程作業程序', approved:'113年12月（新教材）', online:'no', sections:[
      {h:'法源依據', p:['依精神衛生法第32條規定：於告知病人後，得拘束其身體並立即護送其就醫；不得以戒具或其他不正當方式為之；緊急或特殊情形未能事前告知時，應於事後告知。']},
      {h:'約束步驟', list:['將擔架放置地面，若狀況許可，設法讓病人先坐在擔架床上。','小組成員約定口令，同時控制病人手腳活動，以控制大關節為原則。','以約束帶束縛手腕與腳踝，約束過程中注意勿離病人的口部太近。','將病人固定於擔架床上：面朝上，一手綁高於頭部、另一手綁低於腰際，雙腳各自綁於擔架床上，約束帶另一端需固定於床架，不可固定在床欄。','擔架安全帶扣上拉緊，但不可妨礙病人呼吸。','如病人會吐口水攻擊，須先控制頭部，再小心協助病人戴上口罩。','依法檢查被護送人之身體及所攜帶之物，注意是否有利器或其他危險物品，將其移除並交給家屬或適當關係人保管。','給予被蓋或衣物適當遮蔽以維護病人尊嚴，但胸腹交界以上部位應保持容易觀察。']}
    ]}
  ]},
  {id:'tech-hazmat-ppe', name:'化學防護裝備分級與穿脫流程', en:'HAZMAT PPE Levels and Donning/Doffing', scenarios:[
    {title:'防護裝備分級（A/B/C/D級）', approved:'113年12月（新教材）', online:'no', sections:[
      {h:'分級原則', p:['美國環保署將化災個人防護裝備分為A、B、C、D等四級，依防護裝備對皮膚黏膜與呼吸道等保護能力的綜合考量分級，也是目前臺灣通用的分級方式；因第一線應變人員通常無法馬上知道確切化學品種類及濃度，實務上必須以最高規格防護為首要選擇。']},
      {h:'A級（最高防護）', list:['適用時機：未知化學物質及濃度、環境中有害物質濃度高達立即致病或影響逃生能力、氧氣含量小於19.5%以下等。','裝備：全面式面罩、正壓自攜式呼吸器（SCBA）、防蒸氣全罩式氣密抗化衣、雙層抗化手套、抗化靴、雙向無線電。']},
      {h:'B級', list:['適用時機：氧氣含量小於19.5%以下、環境物質濃度達立即致命濃度、有腐蝕性液體噴濺等。','裝備：全面式面罩、正壓自攜式呼吸器（SCBA）、覆蓋式防潑灑抗化衣、雙層抗化手套、抗化靴、雙向無線電。']},
      {h:'C級', list:['適用時機：已知空氣中污染物濃度及種類，並可用空氣濾淨式口罩達到過濾效果、氧氣含量大於19.5%以上。','裝備：全罩式或半罩式空氣過濾面罩、安全眼鏡或護目鏡、覆蓋式防潑灑抗化衣、雙層抗化手套及抗化靴、雙向無線電。']},
      {h:'D級', list:['適用時機：有害物質低於容許濃度以下。','裝備：工作服、手套、化學靴、安全眼鏡或護目鏡、安全帽、簡易型口罩。']}
    ]},
    {title:'C級防護衣穿著流程', approved:'113年12月（新教材）', online:'no', sections:[
      {h:'穿著步驟', list:['步驟一：穿著工作服及防護連身衣。','步驟二：穿著抗化靴。','步驟三：戴上防護衣頭套。','步驟四：在防護衣、防護靴接縫處，封上抗化膠帶。','步驟五：戴上防護頭罩並黏合固定。','步驟六：戴內層抗化手套於袖套內層，外層橡膠手套於袖套外層，然後封上抗化膠帶。','步驟七：穿戴空氣幫浦，接上送風管並確認開機及電力充足。','步驟八：裝上防毒罐、背後寫姓名，再次確認防護衣穿著完成。']}
    ]},
    {title:'C級防護衣脫除流程', approved:'113年12月（新教材）', online:'no', sections:[
      {h:'脫除步驟', list:['步驟一：解開送風管，移除送氣幫浦。','步驟二：解開防護頭罩固定。','步驟三：身體前傾，移除防護頭罩。','步驟四：撕開抗化膠帶，脫除外層橡膠手套。','步驟五：解開防護衣拉鍊，移除防護衣頭套。','步驟六：脫除防護衣，由上而下、由內向外捲繞。','步驟七：靠乾淨區腳先脫除抗化靴，並移出除汙區。','步驟八：脫除內層抗化手套後洗手、沖洗身體、更換工作服。']}
    ]}
  ]},
  {id:'tech-radiation', name:'輻射傷患防護與處置原則', en:'Radiation Protection and Patient Handling', scenarios:[
    {title:'輻射防護原則與現場管制', approved:'113年12月（新教材）', online:'no', sections:[
      {h:'輻射防護三原則（TDS）', list:['時間（Time）：作業時間越短越好。','距離（Distance）：距離輻射源越遠越好，需接觸可疑輻射源時用長柄工具而非徒手處理。','屏蔽（Shield）：應變採「合理抑低原則（ALARA）」，盡一切合理努力使輻射曝露維持在實際上遠低於法規之劑量限度。']},
      {h:'現場管制熱區的劃分', p:['熱區劃分標準為100微西弗/小時，冷區劃分標準為0.5微西弗/小時；救護人員若進入輻射災害現場執行人命搶救作業，至少應穿著不織布防塵衣、配戴N95活性碳口罩，並著頭套、鞋套、棉手套等個人防護裝備，重點為全身覆蓋以減少皮膚暴露。']},
      {h:'除污原則', p:['脫掉傷患衣物就可去除大部分的污染；若空氣中有懸浮放射性物質，應考慮給予傷患呼吸防護器具及皮膚除污，身體部分用水沖洗即可，切忌用力刷洗皮膚造成二次傷害；除污後必須再偵測，尤其要注意微粒容易聚積的鼻子與口腔等處。']}
    ]},
    {title:'輻射傷患救護與運送', approved:'113年12月（新教材）', online:'no', sections:[
      {h:'處置原則', list:['在適當防護下，照護輻射污染的傷患，對救護人員、設備和設施不會有嚴重危害。','輻射污染傷患應以醫療優先（Medical first），除污其次，不可因除污而延誤傷患內外科的急救。','有生命危險的傷患，應儘速後送至最近或最快可處理其他嚴重傷情之醫院，不限於核災或輻傷急救責任醫院。']},
      {h:'運送注意事項', list:['以床單或毛毯覆蓋包裹並充分固定傷患。','轉送途中應隨時注意傷患生命徵象，並注意在管制區域內施打的靜脈輸液管路。','告知後送醫院任何傷患在運送途中的病情變化，詢問對此有無特定的指示。','後送途中持續污染管制，必要時更換手套；抵達醫院後遵照後送醫院的緊急應變程序指示行動。']}
    ]}
  ]},
  {id:'tech-mci-command', name:'大量傷病患現場指揮與管理原則', en:'MCI Scene Command and Management', scenarios:[
    {title:'抵達現場的災難管理（4S與METHANE）', approved:'113年12月（新教材）', online:'no', sections:[
      {h:'4S口訣', list:['S（Safety）：確保安全，評估現場對救護人員的潛在風險，確定安全的工作區域。','S（Size-up）：評估事故資訊，包含事故地點、發生時間、類型嚴重度、病人人數、傷勢類型等。','S（Send Information）：狀況回報，讓適當應變人員到達現場、啟動關鍵單位、提供進場路線建議。','S（Set up）：建立指揮，建立事故指揮系統（ICS）。']},
      {h:'METHANE口訣', list:['M（Major incident）：評估是否有災難，需要準備或啟動。','E（Exact Location）：災難的地點在哪裡。','T（Type of incident）：那一類型的災難。','H（Hazard）：現有危害或潛在危害。','A（Access/egress）：如何進入、離開災區，規劃動線。','N（Number of Casualties）：估計有多少傷患、傷患類型。','E（Emergency services）：需要哪些支援。']}
    ]},
    {title:'事故指揮系統（ICS）與3T救護重點', approved:'113年12月（新教材）', online:'no', sections:[
      {h:'ICS指揮架構', p:['事故指揮官負責統籌指揮，不直接參與救災救護；管理幕僚分為安全官、聯絡官、資訊官；功能幕僚分為執行部門（人數最多，負責依計畫執行任務）、計畫部門、後勤部門、財務部門，可依災害規模、類型及需求彈性調整架構。']},
      {h:'3T救護重點', list:['檢傷（Triage）：迅速評估傷病患給予危險等級辨識，使最需要醫療資源介入之傷病患能得到適當治療，通常由檢傷官負責。','治療（Treatment）：在治療區給予傷病患適當治療，依檢傷等級區分紅黃綠黑四區，由醫療官負責。','後送（Transport）：依傷病患等級選擇後送順序及記錄後送醫院，由後送官及集結官負責，避免交通紊亂延誤救災進度。']},
      {h:'檢傷輔助工具', p:['通常會搭配使用檢傷傷票，並以紅、黃、綠、黑四種顏色區分病情嚴重度；內政部消防署大量傷病患管理系統可透過檢傷追蹤系統APP掃描電子傷票上的QR Code，迅速登打傷病患基本資料及傷情，降低現場人員負擔。']}
    ]}
  ]},
  {id:'tech-field-triage', name:'現場檢傷分類與後送指引', en:'Field Triage Guideline', scenarios:[
    {title:'紅色與黃色後送要件', approved:'113年12月（新教材，美國外科醫學會外傷委員會2021版）', online:'no', sections:[
      {h:'紅色要件（高度風險嚴重傷害）－創傷形式', cls:'triage-red', list:['頭、頸、軀幹、近端肢體穿刺傷。','懷疑顱骨開放或凹陷性骨折。','新發生感覺運動功能喪失，懷疑脊椎傷害。','胸壁不穩定、變形（如連枷胸）。','懷疑骨盆骨折。','懷疑兩處以上近端長骨骨折。','肢體擠壓傷、去皮套傷、或脈搏摸不到。','手腕、腳踝以上截肢。','需使用止血帶或持續加壓之持續性出血。']},
      {h:'紅色要件－精神狀態與生命徵象', cls:'triage-red', list:['所有傷患：無法聽從指令（GCS運動功能<6）。','呼吸次數<10或≥29次/分、呼吸窘迫或需要呼吸支持、未給氧時血氧<90%。','0~9歲：收縮壓<70mmHg+(2×年齡)。','10~64歲：收縮壓<90mmHg，心率>收縮壓。','≥65歲：收縮壓<110mmHg，心率>收縮壓。']},
      {h:'黃色要件（中度風險嚴重傷害）－創傷機轉', cls:'triage-yellow', list:['高風險汽車撞擊：部分或完全從車中彈出；車輛凹陷（含車頂）乘客位置>12英吋或任何位置>18英吋；乘客受困需要脫困；同車乘客死亡；兒童（0~9歲）未固定於兒童安全座椅；車輛遙測數據高風險撞擊一致。','騎士遭嚴重撞擊導致與交通工具分離（例如機車、沙灘車、馬）。','行人或單車騎士被拋出、壓輾或被嚴重撞擊（所有年齡）。','10英尺以上墜落。']},
      {h:'黃色要件－考量風險因子', cls:'triage-yellow', list:['兒童（<5歲）、老人（>65歲），在較低高度墜落導致嚴重頭部撞擊。','使用抗凝血劑。','懷孕>20週。','燒燙傷並其他創傷機轉。','兒童應優先被檢傷送至有能力處理兒童的創傷中心。','如有疑慮，轉送至創傷中心（不一定要最高等級創傷中心）。']},
      {h:'後送原則', list:['符合任一紅色要件者：應儘速後送至就近最高等級創傷中心。','未符合紅色要件但符合任一黃色要件者：應儘速後送至就近創傷中心（不一定要最高等級創傷中心）。','兩者皆不符合者：依一般後送原則，送至急救責任醫院或就近適當醫療機構；如有疑慮仍應轉送至創傷中心。']},
      {h:'備註', p:['本指引為美國外科醫學會外傷委員會2021年版「現場檢傷分類與後送指引（Field Triage Guideline）」整理，我國亦訂有適合之版本，實務請以中央衛生主管機關或各縣市消防局所頒布之作業程序為準。','此決策點的目的在於協助救護技術員快速判斷傷患是否為嚴重外傷（Advanced Life Support, ALS）個案，並儘速送往適當等級之外傷中心，藉以提高存活率；評估後仍應依「盡速就醫（Load and Go）」原則，現場處置時間儘量控制在10分鐘內（白金十分鐘）。']}
    ]}
  ]},
  {id:'guide-blood-exposure', name:'血液、體液暴觸後之建議處理流程', en:'Blood / Body Fluid Exposure Protocol', scenarios:[{title:'暴觸後建議處理', approved:'113年12月（新教材）', online:'no', sections:[]}], dept:'S', code:'指引', title:'血液、體液暴觸後之建議處理流程', approved:'113年12月（新教材）', sideinfo:[
      {h:'立即處理方式', list:['尖銳物扎傷或割傷：立即擠壓傷口，以流動水沖洗傷口5分鐘。','破損皮膚或黏膜與病患血液、體液接觸：口與皮膚以流動水沖洗5分鐘；眼睛以0.9%生理食鹽水沖洗5分鐘。']}
    ], steps:[
      {type:'action', text:'發生尖銳物扎傷或割傷，或破損皮膚黏膜與病患血液、體液接觸（註1：傳染性體液包含血液、精液、陰道分泌物、腦脊髓液、滑囊液、肋膜積水、腹水或羊水等）。'},
      {type:'action', text:'立即處置傷口（擠壓傷口/流動水沖洗，或以生理食鹽水沖洗眼睛，皆5分鐘）。'},
      {type:'action', text:'儘速至感染科門診追蹤：確認來源者的B型肝炎病毒、C型肝炎病毒、HIV與梅毒檢驗結果（註2）。'},
      {type:'action', text:'立即至適當醫院就醫，依作業流程通報主管單位（註3）。'},
      {type:'action', text:'依醫師指示進行有感染風險之預防性投藥及定期追蹤（註4）。'},
      {type:'action', text:'若建議進行HIV預防性投藥，可申請費用補助（註5）。'}
    ], notes:[
      '<b>註2：</b>適當醫院係指具備感染科門診，並可進行B型肝炎病毒、C型肝炎病毒、HIV（愛滋病毒）與梅毒檢驗之醫院；若遇非上班時間就直接掛醫院急診就醫。因執行業務暴露致受感染之虞者，應接受上述疾病之抗原或抗體檢查，並請病人協助配合於其同意後進行相關抽血檢查；若無法取得病人同意，依「人類免疫缺乏病毒傳染防治及感染者權益保障條例」第15條之1第1項第1款規定，因醫療之必要性或急迫性，醫事人員得採集檢體進行HIV感染檢測，無需受檢查人或其法定代理人之同意。',
      '<b>註3：</b>應於發生暴露後24小時內向工作單位通報，一週內將「扎傷及血液、體液暴觸通報單」送所在地衛生局備查。',

      {type:'action', text:'胸部按壓被中斷最少之CPR、立即使用AED（主手持續胸部按壓並減少中斷，副手不中斷CPR下儘速使用AED；AED語音指示不要碰觸病人時，所有人應立即中斷任何碰觸病人之動作）。'},
      {type:'decision', text:'心律分析：是否建議去顫（可電擊心律 VF／無脈性VT）？', branches:[

            {label:'否', outcome:'接續下方「不可電擊心律」處置路徑（CPR、建立呼吸道、Epinephrine）。', continue:true}

        {label:'否', substeps:[
          {type:'action', text:'立即開始胸部按壓（不可電擊心律：Asystole／PEA）。'},
          {type:'action', text:'CPR 2分鐘、建立呼吸道（SGA，一次為限）\n<span class="p-badge">P</span>考慮建立IV/IO，並給予 <b>Epinephrine 1mg，IV/IO 推注，每3-5分鐘重複給予</b>。'},
          {type:'decision', text:'重新分析心律：是否轉為可電擊心律？', branches:[
            {label:'否', outcome:'持續CPR，循環直到恢復脈搏或決定送醫。', continue:true},
            {label:'是', outcome:'轉換至「可電擊心律」路徑，開始去顫電擊。', continue:true}
          ]}
        ]}
      ]},
      {type:'action', text:'給予氧氣、使用輔助呼吸道；考慮監測潮氣末二氧化碳（EtCO2）以確保CPR品質及呼吸道位置（EtCO2<10mmHg應改善CPR品質；數值驟升且維持並伴結構性心律，可提早暫停按壓檢查心律脈搏；數值或波形消失應立即評估呼吸道是否脫落或易位；ROSC後數值歸零應立即評估脈搏及呼吸道）。'},
      {type:'action', text:'持續一人CPR，收拾救護器材上擔架床，上救護車後（或開車前）再次使用AED操作一次（註1）。'},
      {type:'action', text:'救護車內救護流程（送往就近適當醫院）。'}
    ], notes:[
      '<b>註1（AED關機/續用原則）：</b>AED操作程序依各縣市消防或衛生機關所頒布作業程序辦理，若無頒布或不清楚時可擇一操作：①若AED要關機時，上救護車或開車前CPR若超過2分鐘，可再次打開AED操作一次；②若AED到院前不關機時，若移動或行駛中語音指示須去顫，應暫停移動至路邊停車再讓AED分析心律，如建議去顫應立刻去顫，若不須去顫應向家屬說明是移動或震動干擾所致，下次若語音分析需去顫則一律不再去顫。',
      '<b>建立呼吸道注意事項：</b>建立SGA前應目視口中有無異物並排除；異物梗塞造成OHCA者，異物排除前不可放置SGA；置入SGA後得持續胸部按壓並每6秒給予1次通氣；不應干擾CPR與AED分析電擊；氣管內管以一次為限，失敗後應立即考慮其他呼吸道。',
      '<b>機械胸部按壓裝置（如LUCAS）：</b>相對於徒手並無證據顯示更為有效，徒手胸部按壓仍為準則；惟施救人數有限、長時間CPR或行駛中救護車內CPR等情境下可使用。',
      '<b>院前啟動體外心肺復甦術（ECPR）參考條件：</b>年齡<70歲、目擊倒地、有旁觀者立即CPR、初始心律為可電擊心律、無明顯外傷/臥床/癌症末期等不可逆末期疾病、預估現場至醫院小於8分鐘路程；符合者可依當地流程評估是否預先通報醫院院前啟動。'
    ]
  },
  {id:'flow-rosc', dept:'M', code:'M2', title:'復甦後照護流程', approved:'115年函頒', steps:[

      {type:'action', text:'給氧以及換氣：給予氧氣直到血氧數值可被有效監測，目標血氧值90%-98%，目標潮氣末二氧化碳35-45mmHg。'},

  },
  {id:'flow-loc', dept:'M', code:'M3', title:'非外傷意識不清救護流程', approved:'113年12月（新教材）', sideinfo:[
      {h:'意識不清常見原因（A-E-I-O-U-TIPS）', list:['A 酒精 Alcohol／酸中毒 Acidosis','E 腦病變 Encephalopathy／電解質不平衡／內分泌異常','I 血糖相關 Insulin／Hypoglycemia／DKA／HHNK','O 缺氧 Oxygen／藥物過量 Overdose／鴉片類藥物 Opiates','U 尿毒症 Uremia','T 外傷 Trauma','I 感染 Infection／出血性腦出血／梗塞型腦中風','P 精神疾病 Psychogenic causes','S 抽搐 Seizure／昏厥 Syncope／顱內佔位性病變']},
      {h:'瞳孔與腦中風評估要點', list:['正常瞳孔等大2~4mm且對光有反應；針狀瞳孔懷疑鴉片類藥物過量、有機磷農藥中毒、腦幹中風；單側瞳孔放大且對光無反應，另側正常，懷疑該側腦疝脫、腦出血或腫瘤。','辛辛那提到院前腦中風指標：嘴角歪斜、口齒不清或失語症、單側肢體無力或麻木（三項任一應懷疑腦中風），須詢問症狀發生時間、血糖是否≥60mg/dL、有無癲癇抽搐。','症狀發生4.5小時內建議轉送有能力施行血栓溶解劑治療之醫院；24小時內且疑似大血管阻塞腦中風（G-FAST：辛辛那提指標加眼球運動受限或偏向測試，4項有3項以上不正常）建議轉送有能力施行動脈內取栓術之醫院。','疑似腦中風後送姿勢建議：頭部抬高30度半坐臥。']}
    ], steps:[
      {type:'action', text:'非外傷現場救護流程發現有突發或原因不明之意識不清。'},
      {type:'decision', text:'量測血糖值是否 <60 mg/dL 或顯示"Low"？', branches:[
        {label:'是', outcome:'給予口服葡萄糖，或中級以上救護技術員給予葡萄糖水靜脈注射。', continue:true},
        {label:'否', outcome:'考慮其他意識改變原因（缺氧、休克、藥物過量或中毒、中風等，參考A-E-I-O-U-TIPS）。', continue:true}
      ]},
      {type:'action', text:'檢查瞳孔大小等重點式身體檢查（並比較二側上肢和下肢感覺與運動功能）。'},
      {type:'action', text:'量測血壓及血氧等輔助檢查。'},
      {type:'action', text:'救護車內救護流程。'}
    ], notes:['長期臥床病人若意識與平常相同則不屬於急性意識改變，需考慮其他求救原因。','出血性腦中風病人可能伴隨呼吸型態異常，可經由疼痛刺激測試神經學情形。']
  },
  {id:'flow-dyspnea', dept:'M', code:'M4', title:'呼吸困難的救護處置流程', approved:'115年函頒（南投縣氣喘/COPD給藥）＋113年12月（新教材通用呼吸困難流程）', steps:[
      {type:'action', text:'非外傷現場救護流程判定為喘或呼吸困難（症狀：呼吸不順、費力、張口呼吸或使用呼吸輔助肌如肋間肌/鎖骨上肌肉內縮，或有明顯異常呼吸音喘鳴、哮鳴）。'},
      {type:'action', text:'聽診兩側肺音等重點式身體檢查（評估胸部起伏是否對稱、頸靜脈是否怒張或塌陷、觸診氣管是否偏移、上或下肢是否水腫；喘鳴音Stridor多於吸氣期聽到，懷疑上呼吸道阻塞；哮鳴音Wheezing多於吐氣期聽到，嚴重氣喘可吸吐氣皆有）。'},
      {type:'decision', text:'是否有哮鳴音（Wheezing），且懷疑氣喘或慢性阻塞性肺病（COPD）發作？', branches:[
        {label:'是', substeps:[
          {type:'action', text:'病人有自備或救護車配置短效型支氣管擴張劑且意識清醒者，可協助病人或家屬給予（2劑，間隔1分鐘，每20分鐘可再次用藥；若已使用過應儘速就醫）。'},
          {type:'action', text:'<span class="p-badge">P</span>給予氣霧治療（限≥1歲且無心肌梗塞病史；藥物如Atrovent／Bricanyl／Ventolin／Salbutamol／Berotec／Combivent，氧氣流量6L/min經小型噴霧器霧化吸入；1-2歲給予1/2劑量並以N/S稀釋至4ml）。'}
        ]},
        {label:'否', outcome:'', continue:true}
      ]},
      {type:'action', text:'量測血氧濃度等輔助檢查（註1、註2）。'},
      {type:'decision', text:'血氧濃度是否 <94%？', branches:[
        {label:'是', outcome:'給予氧氣（註3：依呼吸情況選用鼻導管1~6L/min／簡單型氧氣面罩6~10L/min／已發紺或懷疑一氧化碳中毒者給予非再吸入型氧氣面罩10~15L/min；COPD病人血氧目標<90%或老年人<92%）。', continue:true},
        {label:'否', outcome:'', continue:true}
      ]},
      {type:'action', text:'上擔架床（註4：意識清醒病人建議採頭部抬高30°之半坐臥或病人覺得舒適之姿勢）。'},
      {type:'action', text:'救護車內救護流程。'}
    ], notes:[
      '<b>註1：</b>要量測血壓血氧，必要時要量測體溫等輔助檢查。高濃度氧氣治療傷病人，上救護車後若SpO2仍<90%且意識惡化時，應改以BVM人工呼吸，並每2分鐘檢測1次生命徵象。',
      '<b>註2：</b>給予氧氣時要注意氧氣筒還能使用的時間，換算公式：(壓力錶psi−殘餘壓力)×氧氣筒係數÷每分鐘流速(L/min)＝可使用時間(min)（攜帶式殘壓200psi、係數0.18；固定式殘壓500psi、係數0.68）。',
      '<b>過度換氣症候群：</b>快速呼吸伴隨恐慌、胸痛、心悸、肢體麻木甚至窒息感；處置為安慰病人並試著減輕壓力或請病人深呼吸放慢呼吸速率；不建議以紙袋或塑膠袋罩住病人口鼻（可能導致低血氧惡化病情），氧氣面罩降低流量(1L/min)之措施亦無實證醫學證據支持。'
    ]
  },
  {id:'flow-shock', dept:'M', code:'M5', title:'非外傷低血壓、休克的救護處置流程', approved:'113年12月（新教材）', sideinfo:[
      {h:'休克的種類', list:['心因性休克：心肌梗塞、嚴重心律不整、心臟衰竭導致心輸出量不足；表徵：低血壓、呼吸困難、肺部濕囉音（肺水腫）、頸靜脈怒張。','阻塞性休克：心包填塞、張力性氣胸、肺栓塞導致心輸出過程受阻；表徵：低血壓、呼吸急促、頸靜脈怒張、無脈性電氣活動（PEA）。','低血容性休克：內/外出血或脫水（嘔吐、腹瀉、大量出汗、燒燙傷）；表徵：低血壓、心跳加快（代償）、皮膚蒼白冰冷、少尿。','分佈性休克（血管擴張型）：敗血性（細菌感染）、神經性（脊髓損傷交感神經喪失）、過敏性（嚴重過敏反應）；表徵：皮膚潮紅、血壓下降、呼吸困難、意識改變。']}
    ], steps:[
      {type:'action', text:'非外傷現場救護流程判定為低血壓、休克（註1）。'},
      {type:'action', text:'呼吸及脈搏速率等重點式身體檢查（註2）。'},
      {type:'action', text:'量測血壓及血氧濃度等輔助檢查（註3）。'},
      {type:'action', text:'給予氧氣及抬高下肢等必要處置（註4）。'},
      {type:'action', text:'救護車內救護流程。'}
    ], notes:[
      '<b>註1：</b>病人出現組織灌流不足與休克的徵候，如血壓低冒冷汗、膚色蒼白、手腳濕冷或微血管充填時間>2秒等徵候。',
      '<b>註2：</b>如腹痛時要評估腹部視診是否有腫脹和觸診是否有壓痛等，必要時評估頸靜脈是否塌陷、眼睛是否凹陷、口舌乾燥、皮膚乾癟或失去彈性等脫水或出血引起低血容性休克之徵候。低血容休克可依約略失血量分為Class I(<15%)至Class IV(>40%)，並觀察心率、血壓、脈搏壓、呼吸速度、尿量、GCS等變化；心率和血壓應存有相對性心搏過慢/相對性低血壓觀念，Shock index（心率÷收縮壓）>1時應懷疑有休克。',
      '<b>註3：</b>血氧濃度<94%之休克病人應給予氧氣。',
      '<b>註4：</b>若下肢無外傷，應將病人平躺並把下肢抬高約15~30公分或30°~60°角度後送，移動或此姿勢會使病人疼痛時就不要操作；若為大於20週之休克孕婦，須用雙手把子宮推向左側或左側躺，以解除子宮壓迫下腔靜脈導致靜脈回流不足之現象。判定病人有低血壓、休克時，應施予靜脈注射生理食鹽水，聽診肺音清晰者可調整較高之流速。'
    ]
  },
  {id:'flow-anaph', dept:'M', code:'M6', title:'過敏性休克流程', approved:'113年（南投縣預立流程）', steps:[
      {type:'action', text:'服用藥物、食物、接觸動植物或蚊叮蜂螫後，突然發生全身水腫、皮膚潮紅、全身癢疹，疑為過敏反應之患者。'},
      {type:'action', text:'評估並暢通維持呼吸道，評估血壓與循環現象。'},
      {type:'decision', text:'是否出現上呼吸道阻塞徵候，或是否低血壓休克？', branches:[
        {label:'否', outcome:'依非危急個案處置原則進行後續照護、送醫；病情變化則重新評估。'},
        {label:'是（任一）', outcome:'依危急個案處置原則進行後續照護、送醫；評估運送路程；考慮給予1000mL以上大量生理食鹽水灌注；考慮給予Epinephrine（成人0.3-0.5mg肌肉注射；小兒0.15mg肌肉注射）。'}
      ]}

      '執行之救護紀錄由醫療指導醫師簽核。',
      '<b>EMT-2腎上腺素注射筆（如救護車配置）：</b>經初步評估及病史詢問後，若判斷為因嚴重過敏反應引起之過敏性休克，可於現場施打，並於到院後與醫護人員交接。使用方式：①以肌肉注射方式在大腿前外側處打入，必要時可隔著衣物施打；②若不穩定的過敏性反應持續存在，必要時可每10分鐘再追加施打；③每支為單次使用。'
    ]
  },
  {id:'flow-acs', dept:'M', code:'M7', title:'胸痛的救護處置流程', approved:'111年03月03日函頒（南投縣ACS流程）＋113年12月（新教材OPQRST/十二導程）', sideinfo:[
      {h:'缺血性胸痛典型症狀', list:['胸骨下或前胸感受到壓迫、緊縮或令人窒息似的疼痛不適，可能延伸到下巴、肩膀或上臂，並伴隨冒冷汗及噁心。','老年人、糖尿病病人及婦女也可能沒有典型胸痛症狀，僅表現含糊不適，如呼吸困難或消化不良。','若為撕裂樣疼痛且由前胸轉移至背部，須懷疑主動脈剝離，常伴隨高血壓或休克，甚至可見肢體脈搏減弱。']}
    ], steps:[
      {type:'action', text:'非創傷現場救護流程判定為胸痛（註1：主訴胸痛或胸悶等症狀）。'},
      {type:'action', text:'詢問病史、現病史與身體檢查（註2：以OPQRST詢問—發作狀況／緩解或加劇因子／疼痛性質／位置與轉移／嚴重程度1-10分／持續時間）。'},
      {type:'action', text:'量測血壓及血氧濃度等輔助檢查，執行12導程心電圖（註3）。'},
      {type:'decision', text:'是否為缺血性胸痛（急性冠心症）（註4）？', branches:[
        {label:'是', substeps:[
          {type:'decision', text:'心電圖判讀是否為ST節段上升心肌梗塞（STEMI，可能顯示ACUTE MI／STEMI／ST Elevation等字樣）？', branches:[
            {label:'是', outcome:'立即後送至可執行心導管手術或使用血栓溶解劑之醫院，避免送至無法處置之醫院造成轉院延遲；<span class="p-badge">P</span>協助病人服用硝化甘油(NTG)舌下含片（確認無禁忌症，每5分鐘一次，最多3次，含已自行服用次數）；<span class="p-badge">P</span>考慮給予嚼服Aspirin 300毫克（確認無禁忌症）；血氧<90%給予氧氣；心電圖可無線回傳救災救護指揮中心並轉傳心導管醫院，及早啟動心導管室（目標FMC2B time<90分鐘）。'},
            {label:'否', outcome:'血氧<90%之病患應給予氧氣；若無禁忌症，<span class="p-badge">P</span>可協助病人服用NTG舌下含片（每5分鐘一次，最多3次）；送往就近適當急救責任醫院；建議轉送至車程<30分鐘且有能力施行血栓溶解劑或緊急心導管介入治療之醫院。'}
          ]}
        ]},
        {label:'否', outcome:'依通用救護流程處置。', continue:true}
      ]},
      {type:'action', text:'上擔架床。'},
      {type:'action', text:'救護車內救護流程。'}
    ], notes:[
      '<b>NTG禁忌症：</b>收縮壓<90mmHg；脈搏<50次/分或>100次/分；24小時內曾服用威而鋼(Viagra)或48小時內服用犀利士(Cialis)等藥物；對NTG過敏者；右心衰竭者。',
      '<b>Aspirin禁忌症：</b>對阿斯匹靈類過敏；同時主訴背部疼痛；兩側上肢收縮壓差距超過20毫米汞柱；疑吞嚥飲水困難；疑活動性出血；肝硬化病史。到院前用藥須完成用藥同意書。',
      '執行之救護紀錄由醫療指導醫師簽核。'
    ]
  },
  {id:'flow-palpitation', dept:'M', code:'M8', title:'心悸的救護處置流程', approved:'113年12月（新教材）', sideinfo:[
      {h:'心悸常見成因', list:['疾病相關：甲狀腺機能亢進、發燒、貧血、低血容等。','心理因素：焦慮、恐慌等。','藥物使用：酒精、咖啡因、支氣管擴張劑等。','心臟因素：心律不整、心臟衰竭、二尖瓣脫垂等。']}

      {type:'action', text:'救護車內救護流程。'}

  {id:'flow-brady', dept:'M', code:'M9', title:'心搏過緩流程', approved:'115年函頒', needsMedDirector:true, steps:[
      {type:'action', text:'患者心搏過緩（心跳＜50/分）。'},
      {type:'action', text:'評估以及維持基本生命徵象：維持患者呼吸道並給予氧氣；評估是否需要正壓通氣；連接生理監視器監視生命徵象。'},
      {type:'decision', text:'患者是否不穩定（註1）？', branches:[
        {label:'否', outcome:'辨識並治療可能原因：維持生命徵象、考慮給予氧氣、考慮執行12導程心電圖，持續觀察。'},
        {label:'是', outcome:'', continue:true}
      ]},
      {type:'decision', text:'持續心搏過緩且血循動力不穩定？', branches:[
        {label:'是', outcome:'<span class="p-badge">P</span>給予Atropine；如無效則考慮TCP或Epinephrine滴注（註2）。'},
        {label:'否', outcome:'持續觀察，並辨識治療可能原因。'}
      ]}
    ], notes:[
      '<b>註1（不穩定跡象）：</b>低血壓、急性意識改變、休克徵候、缺血性胸痛、急性心衰竭。',
      '<b>註2：</b>Atropine 1mg首劑，每3-5分鐘重複，最大總劑量3mg，需線上醫療指導；Epinephrine 2-10mcg/min滴注，調整至患者有反應，需線上醫療指導；TCP需線上醫療指導。'
    ]
  },
  {id:'flow-tachy', dept:'M', code:'M10', title:'心搏過速流程', approved:'115年函頒', needsMedDirector:true, steps:[
      {type:'action', text:'患者心搏過速（心跳≧150/分）。'},
      {type:'action', text:'評估以及維持基本生命徵象：維持呼吸道及呼吸；評估給予氧氣；連接心電圖辨識心律；量測血壓、血氧；建立輸液管路；如可行取得12導程心電圖。'},
      {type:'decision', text:'血循動力是否不穩定（註1）？', branches:[

        {label:'否', outcome:'', continue:true}

      {type:'decision', text:'是否為寬的QRS波（≧0.12秒）？', branches:[

        {label:'是（寬QRS）', outcome:'考慮線上醫療指導。'}
      ]}
    ], notes:[
      '<b>註1（不穩定跡象）：</b>低血壓、急性意識改變、休克徵候、缺血性胸痛、急性心衰竭。',
      '<b>註2：</b>依照各電擊器建議電擊劑量；如無法得知則使用最大電擊劑量。'
    ]
  },
  {id:'flow-fever', dept:'M', code:'M11', title:'發燒、低體溫救護處置流程', approved:'113年12月（新教材）', sideinfo:[
      {h:'體溫判定要點', list:['發燒：核心體溫≧38°C；體溫>41°C多屬「體溫過高」而非發燒（發燒是體溫調節中樞設定改變，體溫過高則肇因於排熱不良）。','低體溫分級：輕度32~35°C（身體發抖增加熱能製造）；中度28~32°C（意識開始改變且發抖減少）；重度28°C以下（意識昏迷且不再發抖）。','測量方式：肛溫（正常約36.5°C，較準但需2~3分鐘，較不適用於救護勤務）；耳溫（正常約36.5°C，最常用，須注意耳道拉直與耳溫套避免交互感染）。']}
    ], steps:[
      {type:'action', text:'非創傷現場救護流程判定為發燒、低體溫。'},
      {type:'action', text:'詢問病史及身體檢查（發燒：何時開始、持續時間、之前是否處於高溫或低溫環境、有無服用或接觸毒藥物，並詢問TOCC—旅遊史、職業別、接觸史、群聚情形；低體溫：有無新陳代謝疾病史如甲狀腺/腎上腺功能低下或低血糖、是否使用藥物）。'},
      {type:'action', text:'量測體溫、血壓及血氧濃度等輔助檢查。'},
      {type:'action', text:'給予必要處置（發燒合併呼吸道症狀應穿戴外科口罩；低體溫應採取適當保暖措施，如蓋上毛毯、脫除浸濕衣物、換上乾燥衣服；當中樞體溫>41°C或<32°C時，符合檢傷「一級」之傷病情況，盡速給予必要處置並於送醫前通報醫院準備）。'},
      {type:'action', text:'上擔架床。'},
      {type:'action', text:'救護車內救護流程。'}
    ], notes:[]
  },
  {id:'flow-abd', dept:'M', code:'M12', title:'非外傷腹部急症救護處置流程', approved:'113年12月（新教材）', sideinfo:[
      {h:'腹部急症常見疾病與腹痛位置對照', list:['右上腹：膽囊炎／膽結石、肝炎、胰臟炎、腎臟結石／腎盂炎。','上腹：心肌梗塞或心絞痛、胃炎、消化性潰瘍、胰臟炎、早期盲腸炎。','左上腹：胃炎、胰臟炎、腎臟結石／腎盂炎。','右下腹：盲腸炎、疝氣、泌尿道結石／腎盂炎、卵巢囊腫、卵巢或睪丸扭轉、骨盆腔發炎、子宮外孕。','全腹部：腸胃炎、腹膜炎、腸阻塞、腹腔內出血、腹主動脈瘤破裂、腹主動脈剝離、糖尿病酮酸中毒。','左下腹：憩室炎、疝氣、泌尿道結石／腎盂炎、卵巢囊腫、卵巢或睪丸扭轉、骨盆腔發炎、子宮外孕。']}
    ], steps:[
      {type:'action', text:'非外傷現場救護流程發現有腹部急症（主訴腹痛、腹脹、噁心嘔吐、腹瀉或糞便顏色改變等症狀）。'},
      {type:'action', text:'腹部重點式身體檢查（先讓病人平躺曲膝，視診腹部是否腫脹、眼睛或膚色是否有黃疸，觸診腹部四象限是否有壓痛）。'},
      {type:'action', text:'量測體溫、血壓及血氧濃度等輔助檢查。'},
      {type:'action', text:'給予必要處置（註1）。'},
      {type:'action', text:'上擔架床。'},
      {type:'action', text:'救護車內救護流程。'}
    ], notes:[
      '<b>註1：</b>如病人血壓偏低懷疑有休克時，可給予靜脈輸注生理食鹽水；血氧濃度<94%之病人應給予氧氣；請病人禁食；給予適當之姿勢，儘速送醫。',
      '<b>腹痛位置對應可能之腹部急症：</b>上腹痛如病人為女性、老人、糖尿病病人，可懷疑不典型心肌梗塞；全腹部如病人主訴腹部撕裂性疼痛，且兩側血壓差20mmHg以上，則可懷疑腹主動脈剝離，應盡速送醫。',
      '在院前會致命的腹部急症以出血相關為主，例如腹主動脈瘤破裂、主動脈剝離、腹內腫瘤破裂或子宮外孕；所有育齡年齡女性若發生急性腹痛，皆須將產科急症列入進一步的臆斷當中。'
    ]
  },
  {id:'flow-dm', dept:'M', code:'M13', title:'糖尿病急症救護處置流程', approved:'113年12月（新教材）', sideinfo:[
      {h:'低血糖與高血糖警訊', list:['低血糖（血糖<70mg/dL相關）：顫抖、心悸、冒冷汗、飢餓感；嚴重時頭痛、躁動、精神不能集中、嗜睡，甚至有類似中風表現、抽搐及昏迷；任何行為改變、意識錯亂或意識不清的糖尿病人都應懷疑低血糖。','糖尿病酮酸血症(DKA)：多見於第一型糖尿病，胰島素缺乏致酸中毒，快而深的呼吸代償，可聞到類似水果發酵的丙酮味，可能導致心律不整及脫水休克。','高滲透壓高血糖狀態(HHS)：多見於第二型糖尿病老年人或未確診者，脫水與高血糖明顯但少有酮體生成，形成需數日，早期症狀與水分流失有關如姿勢性低血壓、心悸、疲累、混亂甚至昏迷。']}
    ], steps:[
      {type:'action', text:'非外傷現場救護流程發現有糖尿病史病人意識不清或身體不適（註1）。'},
      {type:'action', text:'量測血糖值。'},
      {type:'decision', text:'血糖值 <60 mg/dL 或顯示"Low"？', branches:[
        {label:'是', substeps:[
          {type:'decision', text:'意識是否清醒？', branches:[
            {label:'是', outcome:'給予口服果汁或含糖食物。'},
            {label:'否', outcome:'將糖粉塗抹於病人牙齦上，或<span class="p-badge">P</span>給予「D5W／D10W葡萄糖水靜脈注射」。'}
          ]}
        ]},
        {label:'否', outcome:'如血糖值偏高併低血壓或顯示"High"，常合併脫水徵候（如口腔黏膜乾燥合併心搏過速），<span class="p-badge">P</span>可給予生理食鹽水靜脈注射。', continue:true}
      ]},
      {type:'action', text:'檢查瞳孔大小等重點式身體檢查。'},
      {type:'action', text:'量測血壓及血氧濃度等輔助檢查。'},
      {type:'action', text:'上擔架床。'},
      {type:'action', text:'救護車內救護流程。'}
    ], notes:[
      '<b>註1：</b>意識不清係指病人急性意識改變(GCS<14)或送達醫院前意識變差者，長期臥床病人意識與平常相同則不屬於急性意識改變；有糖尿病史併身體不適（常見低血糖症狀顫抖、心悸、冒冷汗、飢餓感，嚴重時躁動、昏睡、抽搐昏迷；常見高血糖症狀呼吸深快、躁動、抽搐、昏迷），須考慮立即量測血糖。'
    ]
  },
  {id:'flow-tox', dept:'M', code:'M14', title:'藥物過量與中毒的救護處置流程', approved:'113年12月（新教材）', steps:[
      {type:'action', text:'主訴或初步評估發現有藥物過量或中毒時即應進入本流程，若可能時應詢問病人服用藥物的時間、種類及大約數量。'},
      {type:'action', text:'若懷疑氣體中毒（例如一氧化碳），應使用適當警示裝備（如CO探測器、五用氣體探測器）及防護裝備，確認現場環境安全，如在室內評估病人前應先打開所有窗戶，或將病人移至通風處，同時確認現場有無其他病人。'},
      {type:'decision', text:'現場是否仍處於安全？必要時將病患移至安全處。', branches:[
        {label:'是', outcome:'依中毒途徑施行必要處置（註1）後上擔架床。', continue:true},
        {label:'否', outcome:'先確保現場安全（如為化學物質中毒，處理病人時須預防自己受污染，必要時先移除病人受污染衣服；若有刺鼻味道如農藥中毒，送醫途中應打開救護車窗戶通風），再依中毒途徑施行必要處置。', continue:true}
      ]},
      {type:'action', text:'可記錄病人的心跳、血壓、呼吸次數、意識、瞳孔大小、膚色、皮膚與黏膜是否潮濕或乾燥，以協助醫護人員判定中毒症候群；若有需要可撥打臺北榮總毒藥物防治諮詢中心24小時諮詢服務電話 02-2871-7121 或 02-2875-7525#85500 進行諮詢。'},
      {type:'action', text:'救護車內救護流程。'}
    ], notes:[
      '<b>註1（口服）：</b>須將毒物或藥物及可能服用的瓶罐或藥袋（或拍照）帶至醫院；如懷疑食入毒藥物中毒，且在1小時內發生者，建議以左側躺姿勢後送。',
      '<b>註1（皮膚／眼睛暴露）：</b>受到波及的皮膚或眼睛應以大量清水或生理食鹽水清洗至少15分鐘，若有污染之衣物應儘快移除；粉狀或金屬化學物質不可用水清洗（禁水性物質如鉀、鈉、烷基鋁、烷基鋰、黃磷、鹼金屬與鹼土金屬、有機金屬化合物、金屬氫化物、金屬磷化物、鈣或鋁的碳化物、生石灰等）。',
      '<b>註1（吸入）：</b>應先將病人移至新鮮空氣處，並密切注意中毒病人呼吸狀態，評估是否有呼吸窘迫情形，必要時給予氧氣；如為一氧化碳中毒應給予100%氧氣治療。'
    ]
  },
  {id:'flow-ped-general', dept:'S', code:'S1', title:'小兒病人緊急救護現場流程', approved:'113年12月（新教材，適用青春期前非外傷之小兒病人）', sideinfo:[
      {h:'小兒評估三角判讀', list:['外觀正常、呼吸異常、循環正常：呼吸問題（呼吸窘迫）。','外觀異常、呼吸異常、循環正常：嚴重呼吸問題（呼吸衰竭）。','外觀正常、呼吸正常、循環異常：循環問題（代償性休克）。','外觀異常、呼吸正常、循環異常：嚴重循環問題（低血壓性休克）。','外觀異常、呼吸異常、循環異常：心肺衰竭（考慮立即進行CPR）。','外觀異常、呼吸正常、循環正常：考慮中樞神經系統、中毒或代謝問題。']}
    ], steps:[

      {type:'action', text:'D評估失能（評估意識－清、聲、痛、否分級、瞳孔大小及對光反應、檢查肌張力；檢測血糖值並治療低血糖）。'},
      {type:'action', text:'E評估病人身體（適當暴露並評估體溫；治療高／低體溫，評估危急傷口並注意兒虐之可能性，註3）。'}

      '<b>註1：</b>小兒評估三角建議在30~60秒內完成，若有任一項異常則為小兒危急個案應儘速送醫。整體外觀以肌張力最為客觀，可觀察四肢是否揮舞，或請照顧者將病人手抬起再觀察其落下，若呈自由落體般軟癱無力則為喪失肌張力。',

  {id:'flow-ob-delivery', dept:'S', code:'S2', title:'緊急生產救護流程', approved:'113年12月（新教材）', sideinfo:[
      {h:'評估與詢問重點（口訣：痛/道/歲/月/胎/次/病）', list:['記錄陣痛間隔時間，若小於5分鐘代表可能即將分娩。','詢問或檢查有無陰道出血、破水與胎頭是否露出。','詢問產婦的年齡。','詢問目前懷孕的月數、週數或預產期日期。','詢問本次懷孕幾胎，是否有雙胞胎。','詢問這是第幾次生產。','詢問有無過去病史。']},
      {h:'孕產史分類（GPA）', list:['G（Gravida，妊娠次數）：包含本次懷孕在內的總懷孕次數。','P（Para，生產次數）：妊娠達20週以上之生產次數，不論胎兒是否存活（多胞胎以一次生產計）。','A（Abortion，流產次數）：妊娠未滿20週即終止妊娠之次數，含自然流產與人工流產。','記錄方式例如G3P2A1，代表第3次懷孕、曾生產2次、流產1次；詢問孕產史有助於評估此次懷孕及生產之風險（例如經產婦急產機會較高）。']}
    ], steps:[
      {type:'action', text:'評估孕婦是否有規則密集的腹部陣痛、破水、陰道出血或胎頭露出等即將分娩徵象。'},
      {type:'action', text:'評估與詢問病史（註1）。'},
      {type:'decision', text:'胎頭是否露出？', branches:[
        {label:'否', outcome:'依通用救護流程處置，並儘速送醫。'},
        {label:'是', outcome:'依單項技術操作規範準備並執行急產接生（註2），完成臍帶處置（註3），再依通用救護流程處置。'}
      ]}
    ], notes:[
      '<b>註1：</b>詳如側欄「評估與詢問重點」。',
      '<b>註2：</b>將產婦平躺、兩膝彎曲、兩大腿張開；必要時給予氧氣；確定胎頭已外露並請產婦用力哈氣、深吸氣；以無菌技術戴手套、鋪無菌治療巾；保護胎頭及會陰但勿用力阻止胎兒產出；頭頸部產出時注意有無臍帶繞頸並排除之；支持頭頸部先使上方肩部露出，再使另一肩露出並順勢娩出；懷疑口鼻分泌物過多可用吸球抽吸並刺激胎兒；產出後以乾紗布擦拭並包裹保暖，30秒後以2個臍帶夾夾臍帶完成臍帶處置後將胎兒交予母親。',
      '<b>註3：</b>若生產過程中遇臍帶繞頸，先以手解除，若無法解除則以兩個臍帶夾間隔10公分夾住後從中間斷臍；胎兒狀況良好者應在產出30秒後才鉗夾臍帶，胎兒若需復甦，目前尚無足夠證據建議鉗夾臍帶的時機。',
      '<b>註4：</b>懷孕20週以上孕婦（子宮底部高度位於或高於臍部）運送建議採左側躺後送姿勢並於上肢建立靜脈輸液路徑；若院前心跳停止，除進行CPR外，可考慮使用機械式胸外按壓心肺復甦裝置及自動給氧機，並請副手將孕婦腹部推向左側，避免子宮壓迫下腔靜脈影響血液回流；受外傷之孕婦需限制脊椎動作時，可用長背板固定後在右側背板下方墊高約10~15公分，同時限制脊椎動作與解除下腔靜脈壓迫。'

  {id:'flow-newborn-resus', dept:'S', code:'S3', title:'新生兒復甦救護流程', approved:'113年12月（新教材）', needsMedDirector:true, sideinfo:[
      {h:'目標血氧濃度（右手或右耳量測）', list:['出生後1分鐘：60~65%。','出生後2分鐘：65~70%。','出生後3分鐘：70~75%。','出生後4分鐘：75~80%。','出生後5分鐘：80~85%。','出生後10分鐘：85~95%。']},
      {h:'APGAR 新生兒評分', list:['外觀膚色（Appearance）：0分＝全身發紺或蒼白／1分＝軀幹粉紅、四肢發紺／2分＝全身粉紅。','心跳（Pulse）：0分＝無／1分＝<100次/分／2分＝≥100次/分。','反射刺激反應（Grimace）：0分＝無反應／1分＝表情皺眉／2分＝哭鬧、咳嗽或打噴嚏。','肌肉張力（Activity）：0分＝軟弱無力／1分＝四肢略為屈曲／2分＝主動活動。','呼吸（Respiration）：0分＝無／1分＝慢、不規則、哭聲弱／2分＝哭聲宏亮、呼吸規則。','於出生後1分鐘及5分鐘各評估一次並加總（0~10分）：7~10分正常、4~6分中度窘迫、0~3分重度窘迫；評估目的為記錄新生兒狀況，不應為評分而延遲上述必要的復甦處置介入。']}
    ], steps:[
      {type:'decision', text:'是否足月？肌肉張力是否良好？是否有呼吸或哭？', branches:[
        {label:'每項皆是', outcome:'新生兒常規照護（擦乾保暖、維持呼吸道暢通、必要時皮膚接觸皮膚保暖並持續觀察）。'},
        {label:'任一項為否', outcome:'', continue:true}
      ]},
      {type:'action', text:'A（黃金一分鐘）：必要時以吸球抽吸口鼻分泌物；擦乾身體、包覆保暖；輕拍足底、摩擦背部刺激；擺位嗅吸姿勢（肩膀下墊高使頭部微仰）。'},
      {type:'decision', text:'是否有適當呼吸，且心率≥100下/分鐘？', branches:[

      {type:'action', text:'B：甦醒球正壓通氣15秒（速率約每分鐘40~60下），同時進行血氧／心電圖監測（35週以上新生兒使用室內空氣，35週以下使用21~30%氧氣）。'},
      {type:'decision', text:'通氣15秒後，評估心跳是否上升、胸部有無起伏？', branches:[
        {label:'心跳有上升', outcome:'評估心率，若≥100次/分轉為復甦後照護；若60~99次/分則再次甦醒球正壓通氣15秒並持續評估。', continue:true},
        {label:'心跳無上升、胸部有起伏', outcome:'再次甦醒球正壓通氣15秒並持續評估心跳與胸部起伏。', continue:true},
        {label:'心跳無上升、胸部無起伏', outcome:'執行通氣校正步驟（擺、吸、漏、壓，註1），正壓通氣30秒。', continue:true}

        {label:'<60次', outcome:'C：胸部按壓，並以100%氧氣正壓通氣（壓胸與吹氣比3:1，每循環2秒，共執行60秒，註2）。', continue:true}
      ]},
      {type:'decision', text:'執行胸部按壓、通氣60秒後，評估心率（每分鐘次數）？', branches:[

      '<b>註3：</b>可於出生後1分鐘及5分鐘評估APGAR評分（詳見側欄）作為新生兒狀況之記錄與溝通參考；惟評估APGAR分數不應延遲上述必要的復甦處置介入。'

  },

  {id:'flow-altitude', dept:'S', code:'S5', title:'高海拔疾病緊急救護流程', approved:'113年12月（新教材）', sideinfo:[
      {h:'高海拔疾病判斷標準', list:['急性高山症（AMS）：進入高海拔地區後出現頭痛，且至少合併食慾變差、疲勞虛弱、暈眩頭暈、夜間難以入睡其中一項。','高海拔腦水腫（HACE）：急性高山症病人出現意識改變或步態不穩；或未合併急性高山症但出現意識改變及步態不穩。','高海拔肺水腫（HAPE）：至少出現休息時呼吸困難、咳嗽、虛弱乏力或運動表現變差、胸悶或胸部充血感兩項，並至少出現肺部濕囉音或哮鳴、中心型發紺、呼吸急促、心跳加快兩項徵候。']}

    ], notes:[
      '<b>註1：</b>大氣壓力隨高度增加逐漸降低，氧氣分壓也隨之降低，攀升速度愈快、高度愈高，高海拔疾病愈快發生且愈嚴重；正常人在2100~2400公尺高度可能開始發生高海拔疾病，大多數高海拔疾病都在1500~3500公尺高度發生。',
      '<b>註2：</b>LLAMSS依頭痛、腸胃道症狀、疲憊虛弱、頭昏/頭重腳輕四項各0~3分加總：3~5分輕度、6~9分中度、10~12分嚴重急性高山症。',
      '<b>註3：</b>降低高度是治療高海拔疾病最首要且最有效的方式：輕度急性高山症應減少體力活動並避免進一步上升高度，於同一高度逗留1~2天適應；中度急性高山症經適應或治療24小時後仍無法改善應立即下山；嚴重急性高山症（高海拔肺水腫或腦水腫）應立即下山至少500~1000公尺；如無法即刻下山，應維持病人SpO2大於90%，急性高山症/高海拔腦水腫給予鼻管2-4L/min，高海拔肺水腫給予鼻管4-6L/min，或使用攜帶型加壓袋（PAC）提供類似降低1500公尺高度之效果。'
    ]
  },
  {id:'flow-behavioral-general', dept:'S', code:'S6', title:'精神疾病病人緊急救護通用流程', approved:'113年12月（新教材）', sideinfo:[
      {h:'精神衛生法第3條「精神疾病」定義', list:['指思考、情緒、知覺、認知、行為及其他精神狀態表現異常，致其適應生活之功能發生障礙，需給予醫療及照顧之疾病。','現場不需要有明確的精神病診斷，只要言行舉止表現明顯異於正常人，且為他人帶來困擾，多半就符合本條所述條件。','傷害他人或自己之虞的風險評估，除意念與行為外，也應考慮是否有人擔心病人會傷害自己、病人是否有妄想幻覺、或因意識混亂使行為無法預測而有危險；如病人有縱火或破壞行為，也需列入危險考慮。']},
      {h:'初步評估口訣（叫叫CABD）', list:['叫：叫團隊','叫：叫周邊、叫裝備','C：認知（Cognition）','A：情緒（Affection）','B：行為（Behavior）','D：決定壓制或降階（Decide/DEFUSE）']},
      {h:'次級評估口訣（居安思危、枕戈待旦）', list:['居：居住環境','安：個人安全','思：思想怪異','危：相信直覺','枕（診）：過去病史','戈：武器藥物','待：對待關係人','旦：緊急計畫']}
    ], steps:[
      {type:'action', text:'通報衛生與警察機關，到達現場。'},
      {type:'decision', text:'現場是否安全？', branches:[
        {label:'否', outcome:'排除危險因子（必要時等待警察到場，或與衛生單位共同處置），確保安全後再接觸病人。', continue:true},
        {label:'是', outcome:'', continue:true}
      ]},
      {type:'decision', text:'是否危急個案？', branches:[
        {label:'是', outcome:'進入緊急救護通用流程。'},
        {label:'否', outcome:'進行初評與病史詢問。', continue:true}
      ]},
      {type:'decision', text:'是否符合精神衛生法第3條病患（註1）？', branches:[
        {label:'否', outcome:'非本流程定義之精神疾病病患，依一般（非危急）狀況處理，必要時轉介相關資源。'},
        {label:'是', outcome:'', continue:true}
      ]},
      {type:'action', text:'由主管機關（衛生局／警察機關）認定有無自傷與傷人之虞（註2）。'},
      {type:'decision', text:'是否經認定有自傷或傷人之虞，並有就醫必要？', branches:[
        {label:'是', outcome:'進入緊急救護通用流程，並依精神衛生法相關規定護送至就近適當醫療機構。', continue:true},
        {label:'否', outcome:'尊重病人意願，必要時轉介心理衛生中心或社區精神病人照護資源。'}
      ]},
      {type:'action', text:'救護車內救護流程。'}
    ], notes:[
      '<b>註1：</b>精神衛生法第3條第1款所稱精神疾病，指思考、情緒、知覺、認知、行為及其他精神狀態表現異常，致其適應生活之功能發生障礙之疾病。',
      '<b>註2：</b>依精神衛生法第48條第2項規定：警察機關或消防機關於執行職務時，發現疑似精神疾病狀態之人，有傷害他人或自己之虞者，非管束不能救護其生命、身體之危險，或預防他人生命、身體之危險時，應通知地方主管機關即時查明回覆是否屬精神病人；經查明屬精神病人者，應即協助護送至就近適當醫療機構就醫；無法查明其身分或無法查明屬精神病人者，地方主管機關應派員至現場共同處理，無法到場或無法及時到場時，應使用具聲音或影像相互傳送功能之科技設備處理之，經地方主管機關認有就醫必要時，除法律另有規定外，應即護送至就近適當醫療機構就醫。',
      '<b>註3：</b>執行約束時應依精神衛生法第32條規定：於告知病人後，得拘束其身體並立即護送其就醫；不得以戒具或其他不正當方式為之；緊急或特殊情形未能事前告知時，應於事後告知。',
      '本流程之判斷順序（現場安全→危急個案→精神衛生法第3條病患→自傷傷人之虞）係依教材各節內容重建，若與貴單位實際作業程序之判斷順序不同，請以貴單位作業程序為準。'
    ]
  },
  {id:'flow-drowning', dept:'S', code:'S7', title:'溺水與潛水急症緊急救護流程', approved:'113年12月（新教材）', steps:[
      {type:'action', text:'到達現場後評估病人，判斷是否有明確的外傷機轉（註1）。'},
      {type:'decision', text:'病人是否有反應？', branches:[
        {label:'否', outcome:'打開呼吸道並檢查呼吸；如有呼吸則聽診肺音；如無呼吸，先給予2次人工呼吸並檢查頸動脈搏（頸動脈搏摸不到者，進行30次胸外按壓後2次人工呼吸，並注意分泌物逆流；頸動脈搏摸得到者，持續人工呼吸並給予高流量氧氣）。', continue:true},
        {label:'是', outcome:'聽診肺音：四個位置皆出現濕囉音者給予高濃度氧氣治療；部分出現濕囉音者給予低流量氧氣治療。', continue:true}
      ]},
      {type:'action', text:'必要處置（註2）。'},
      {type:'action', text:'救護車內救護流程（註3）。'}
    ], notes:[
      '<b>註1：</b>溺水病人頸椎受傷比例約0.009%，絕大部分與溺水環境相關之外傷，如明顯外傷徵候或在淺水區跳水、滑水道滑水或衝落大排水溝等；除非有明確外傷機轉（如明顯頭部或脊椎外傷、主訴頸部背部下背痛、四肢麻或無力），否則不需要例行性給予頸椎減移。',
      '<b>註2：</b>適時除去病人濕衣物或擦乾身體，用毛毯、乾衣物包覆保暖，並測量核心體溫，如有低體溫應依低體溫流程處置，搬動時應使身體保持水平以免減少腦部和心臟血流；懷疑溺水的病人都要給予100%氧氣避免延遲性肺部症狀；給予靜脈輸液（生理食鹽水或乳酸林格氏液）維持靜脈通暢即可，過度給水可能導致肺水腫或腦水腫；應測量血糖，低血糖也可能是造成溺水的原因；有潛水急症病人應儘可能送往設有高壓氧設備的醫院，並保持在一個大氣壓力下送醫，避免搭乘未加壓艙的航空器；再加壓是治療減壓病或氣體栓塞的主要方式。',
      '<b>註3：</b>除非已明顯死亡（從溫水〔水溫超過6.1℃〕救起且無生命徵象或持續30分鐘復甦仍失敗，或已知沉入水溫低於6.1℃之水中超過60分鐘），否則所有溺水病人均應積極給予救護；所有溺水病人應運送至急診評估，即使無症狀也應衛教肺部傷害可能於溺水後數小時才發生。'
    ]
  },
  {id:'flow-cold-heat', dept:'S', code:'S8', title:'冷、熱急症緊急救護流程', approved:'113年12月（新教材）', sideinfo:[
      {h:'熱急症三級分類', list:['熱痙攣：疼痛性隨意肌痙攣，因大量流汗導致水分與電解質流失，最常見於小腿腹、上臂、腹或背部肌肉。','熱衰竭：脫水大於體重2%以上，病人有正常意識、出汗，核心體溫介於正常至40℃間。','中暑：中樞體溫超過40℃及中樞神經異常（躁動、嗜睡、抽搐、昏迷），死亡率約30~80%；約半數運動型中暑病人仍會出汗，無汗症不一定會表現出來。']},
      {h:'低體溫四級分類', list:['輕度低體溫（32~35℃）：發抖以增加熱能製造，達最大產熱效果。','中度低體溫（28~32℃）：意識開始改變且發抖減少，體溫32℃可能出現心房纖維顫動或心搏過緩。','重度低體溫（24~28℃）：意識昏迷且不再發抖，體溫26.7~27.8℃時任何物理刺激都可能造成心室纖維顫動。','深度低體溫（24℃以下）：心臟不收縮，成人最低溫存活紀錄為13.7℃。']}
    ], steps:[
      {type:'action', text:'觀察環境，判斷可能的傷害原因（在確保救護技術員安全的前提下，儘速將病人脫離危險環境後再評估處置）。'},
      {type:'decision', text:'是否有明確的外傷機轉？', branches:[
        {label:'是', outcome:'依外傷現場救護流程處置，並考慮頸椎及其他外傷危害。'},
        {label:'否', outcome:'依非外傷現場救護流程處置。', continue:true}
      ]},
      {type:'action', text:'其他（回溫／降溫）必要處置（註1、註2）。'},
      {type:'action', text:'救護車內救護流程。'}
    ], notes:[
      '<b>註1（低體溫處理原則）：</b>使中樞體溫快速恢復至30℃以上；被動回溫即是保暖避免熱量繼續散失，主動回溫包括暖氣、電毯、烤燈、溫暖的靜脈輸液（40~42℃）及吸入溫暖潮濕的氧氣（約42~46℃）。凍瘡治療即回溫，不可用火烤或電暖爐等乾熱方式，將肢體浸泡於37~39℃溫水中最為適宜，除去濕衣物並保留水泡；低體溫病人可能有潛在脫水及低血糖風險，應考慮給予快速輸液及血糖監測。無意識低體溫病人評估呼吸和脈搏時至少應評估30-45秒，不應在一開始就斷定病人死亡；除顫前應先進行2分鐘CPR，若電擊後仍偵測不到脈搏，應先暫緩除顫並著重將中樞體溫提升到30℃以上再繼續除顫。',
      '<b>註2（熱急症處理原則）：</b>先降溫再送醫，利用冰塊和冷水浸泡是最快的降溫方式，將病人全身濡濕並搧風是第二有效降溫方式，單用冰袋置放於腋窩、頸動脈、股動脈處不足以快速降低中樞體溫，應儘速將中樞體溫降至40℃以下並維持生命徵象；運送過程中應安置於已準備好空調的救護車內，每5至10分鐘測量一次中樞體溫；輸液治療時應避免過度灌注，因體溫下降時可能因體液重新分配造成肺水腫，熱中暑病人常併有低血糖情形，應測量血糖並給予矯正。'
    ]
  },
  {id:'flow-bite-sting', dept:'S', code:'S9', title:'動物咬螫傷緊急救護流程', approved:'113年12月（新教材）', sideinfo:[
      {h:'台灣常見毒蛇蛇毒特性', list:['出血性蛇毒：百步蛇、龜殼花、赤尾青竹絲。','神經性蛇毒：雨傘節、飯匙倩（眼鏡蛇）。','混合性蛇毒（以出血性為主，兼有神經性徵狀）：鎖鏈蛇。']},
      {h:'蜂螫傷三類症狀', list:['局部症狀：局部紅、腫、熱、痛或輕度搔癢。','毒性症狀：需多個蜂螫才較會產生，包含噁心嘔吐腹瀉、吞嚥困難抽搐神智不清、發燒全身水腫血壓下降休克等。','過敏症狀：不論蜂隻大小，一隻叮咬就可能引發嚴重過敏性休克，症狀包括乾咳、喉嚨或胸部緊縮感、眼皮浮腫發癢、全身蕁麻疹、呼吸困難、冒冷汗、血壓下降、昏迷；致死多半於螫傷後前15分鐘內發生。']}
    ], steps:[
      {type:'action', text:'觀察環境，確認現場安全（蜂螫傷案件確認是否仍有殘餘蜂群攻擊，必要時穿著全副防護裝備協助病人離開；蛇咬傷案件切勿嘗試捕捉蛇類，但盡可能記錄或詢問蛇的種類特徵）。'},
      {type:'action', text:'依外傷現場救護流程評估呼吸道及呼吸（神經性毒蛇咬傷可能抑制呼吸；蜂螫傷可能喉頭水腫導致呼吸困難）與循環（毒蛇咬傷可能低血壓、蜂螫傷可能過敏性休克，皆應建立靜脈路徑）。'},
      {type:'action', text:'給予動物咬螫傷處置（註1）。'},
      {type:'action', text:'救護車內救護流程，儘速將毒蛇咬傷病人後送至有抗蛇毒血清之醫院（註2）。'}
    ], notes:[
      '<b>註1：</b>毒蛇咬傷應讓病人保持冷靜減少活動，切勿給予酒或藥物加速血液循環；儘早卸除肢體戒指手錶等束縛物；腫脹部位前緣應每15分鐘標記以確定進展速度；患肢保持與心臟同高，主要關節保持相當程度伸展（小於45度屈曲）；可運用彈性繃帶由遠心端往近心端包紮，覆蓋傷口遠端與近端各10至15公分，並輔以夾板固定使其不亂動，包紮是為了避免毒液進入大循環。蜂螫傷若毒刺及毒囊留置皮膚，應儘快用指甲、刀片或信用卡輕輕刮除（毒液會持續進入皮膚45至60秒），以肥皂水或消毒水清洗傷口，可冷敷減輕熱腫不適；若病人有過敏性休克症狀且備有醫師處方箋之腎上腺素筆，中級救護技術員得協助病人施打，或依當地預立醫囑請求高級救護技術員支援。',
      '<b>註2：</b>國內毒蛇血清有四種：抗龜殼花及赤尾青竹絲蛇毒血清、抗雨傘節及飯匙倩蛇毒血清、抗百步蛇毒血清、抗鎖鏈蛇毒血清，可至衛生福利部疾病管制署智慧防疫物資管理系統查詢轄內急救責任醫院是否備有血清。'
    ]
  },
  {id:'flow-marine-sting', dept:'S', code:'S10', title:'有毒海洋生物咬螫傷緊急救護流程', approved:'113年12月（新教材）', sideinfo:[
      {h:'海洋生物中毒途徑', list:['具有毒刺或毒牙生物之螫咬傷：如石頭魚、獅子魚、魟魚等魚鰭具棘刺的魚類；具含毒腺齒舌的芋螺；藉毒牙注入毒素的海蛇。','刺絲胞生物螫傷：水母、海葵、水螅及珊瑚等，體表或觸手具刺細胞，受刺激時釋放毒素。','接觸性毒傷害：觸摸海參、海星、海膽等棘皮動物被外殼及剛毛刺傷，或觸摸海兔分泌的有毒黏液而受傷。']}
    ], steps:[
      {type:'action', text:'判斷病人受傷機轉（註1），依外傷現場救護流程評估。'},
      {type:'action', text:'給予海洋生物咬螫傷處置（註2）。'},
      {type:'action', text:'救護車內救護流程。'}
    ], notes:[
      '<b>註1：</b>未注意或未看到遭受何種海中生物螫咬傷時，可根據傷口特徵評估，將傷處分為穿刺傷口或過敏徵象（如紅疹、水泡、蕁麻疹、觸鬚痕等）來推測為何種生物所傷；魚鰭棘刺毒性物質會產生劇痛、紅腫、血壓下降、嘔吐、肌肉麻痺、休克死亡；海蛇毒性為神經性毒素，症狀由輕微逐漸惡化，可能導致吞嚥困難、全身癱瘓，嚴重時數十分鐘內死亡。',
      '<b>註2：</b>刺絲胞生物：以鑷子移除可見觸手碎片，避免接觸觸手，用海水輕柔清洗傷口（濕沙子及淡水會刺激刺囊細胞持續釋出毒液，禁忌），持續輕柔清洗直到疼痛大幅緩解。棘皮動物：以鑷子移除嵌入身體的刺，穿戴保護手套，較大的刺需醫師手術取出。魟魚：尾部有毒刺且有倒鉤，可能造成15~20公分長嚴重撕裂傷，倒刺沒入組織內需醫師手術取出。大部分海洋毒素在溫度濕度改變後會失去毒性，對穩定病人建議將患部浸泡溫暖的水中（不超過45℃但不小於40℃）至少20分鐘或直至疼痛緩解，兩側足部或手部不要同時浸泡熱水，避免麻木或嚴重疼痛而不自覺燙傷。'
    ]
  },
  {id:'flow-electrical', dept:'S', code:'S11', title:'電傷害病人緊急救護處置流程', approved:'113年12月（新教材）', sideinfo:[
      {h:'雷擊傷害分類', list:['直接雷擊。','側面雷擊（噴濺接觸）：雷擊擊中物體後噴濺至一名或多名病人。','接觸性雷擊：病人與被雷擊直接或側面擊中之物體直接接觸。','地面雷擊：電流從病人一腳通過再從另一腳回到地面。','反向電流：電流從地面通過病人身體，但沒回流到地面，能量較低。','爆炸傷或鈍傷：雷擊產生強大衝擊波，造成爆炸傷及鈍傷。']},
      {h:'觸電傷害分類', list:['一相觸電：電流由觸電處通過人體與地面相通部位，日常生活觸電多屬此類。','二相觸電：人體兩處碰到電源，電流由高電位流向低電位處通過人體。','跨步電壓觸電：電源對周遭導電構成不同電壓同心圓，人體雙腳邁開接近電源時出現電位差而觸電。']}
    ], steps:[
      {type:'action', text:'觀察環境，確認現場安全，評估是否有雷擊或觸電機轉（註1）。'},
      {type:'action', text:'移除電傷害的來源（註2）。'},
      {type:'action', text:'依外傷現場救護流程評估，特別注意是否合併骨折（尤其頸部）及意識狀態變化。'},
      {type:'action', text:'救護車內救護流程（註3）。'}
    ], notes:[
      '<b>註1：</b>電壓超過1000伏特稱為高壓電，但電壓超過600V即明顯增加嚴重受傷機率；閃電屬極高壓直流電，瞬間溫度可達8,871~33,315℃；不論遭受雷擊或觸電，皆須考慮有無因電擊而從高處摔落之可能。閃電像瞬間巨大直流電擊，可能造成心室停止；交流電常導致心室纖維顫動，兩者均可能引起呼吸停止；當一群人同時受到閃電傷害時，大量病人檢傷應「逆向檢傷」，先救看起來是死亡（呼吸停止）的病人，因誤觸交流電而呼吸停止者除CPR外還要儘早進行心臟去顫術。',
      '<b>註2：</b>高壓電線需移開至少10公尺方能接近病人，必要時求助專業人員切斷電源，未斷絕電源前絕不進入遭高壓電傷害病人的區域；若非高壓電，可用最迅速安全方法將病人與電源隔開，如站在木箱、塑膠管、橡皮墊或報紙等乾燥絕緣體上，用乾的掃把、竹竿或木椅將病人肢體拖離電源。',
      '<b>註3：</b>已恢復心跳的病人搬運時應小心避免再次發生心室纖維顫動，並持續監測心電圖；觸電病人給予輸液治療，因大量組織被破壞及燒傷，輸液量應比實際燒傷體表面積計算的量要大：24小時靜脈輸液量＝4ml×病人體重(Kg)×燒燙傷面積(%)，前8小時給一半量、後16小時再給另一半量；若為閃電擊中，心跳和血壓恢復穩定後要節制水份給予，以免造成進一步腦水腫；評估病人時可能有耳朵疼痛、聽力減退等耳膜震裂之臨床表現。'
    ]
  },
  {id:'flow-toxic-gas', dept:'S', code:'S12', title:'有毒氣體中毒緊急救護流程', approved:'113年12月（新教材）', sideinfo:[
      {h:'有毒氣體四大分類', list:['單純窒息性氣體：取代正常空氣並降低吸入氧氣濃度，如二氧化碳、甲烷、丙烷、惰性氣體等。','化學窒息性氣體：妨礙細胞獲得氧氣而使細胞缺氧，如一氧化碳、氰化物等。','刺激性毒氣：刺激呼吸道等黏膜而產生呼吸困難，如氯氣、氨氣。','刺激性合併窒息性毒氣：如硫化氫。']}
    ], steps:[
      {type:'action', text:'到達現場評估現場安全，儘可能蒐集現場資料（可搭配現場標示版、緊急應變指南及物質安全資料表獲取處理資訊），確定安全後採取適當防護措施接近病人，必要時著空氣呼吸器或其他必要防護裝備，將病人帶離暴露源並視需要進行除污（註1）。'},
      {type:'action', text:'非外傷現場救護流程：病史詢問追問職業和環境以判斷有毒氣體種類；評估呼吸道及呼吸為重點，儘快給予100%氧氣貯留袋的不重複吸氣面罩之氧氣治療；評估循環（單純窒息性氣體會因低血氧發紺，化學窒息性氣體會有明顯缺氧但無發紺）；重點式身體檢查聽診兩側肺音是否有囉音或喘鳴音（註2）。'},
      {type:'action', text:'救護車內救護流程，送醫途中打開救護車窗戶以利車內通風。'}
    ], notes:[
      '<b>註1：</b>若為大量病人事件或不能行動的病人超過2人而現場救護技術員不足以應付時，應通報救災救護指揮中心請求支援；有毒氣體除造成呼吸道傷害外，也可能吸附或附著於病人衣物或皮膚上，須記得對病人外表進行除污，如有必要得對病人眼睛進行沖洗。',
      '<b>註2：</b>吸入刺激性毒氣會造成肺水腫；需特別注意化學窒息性氣體中毒的病人，其血氧飽和濃度數值可能是正常的；如眼睛或皮膚接觸刺激性毒氣，應用清水沖洗20~30分鐘。'
    ]
  },
  {id:'flow-other-poison', dept:'S', code:'S13', title:'其他中毒緊急救護流程', approved:'113年12月（新教材）', sideinfo:[
      {h:'常見中毒途徑', list:['吸入：通過呼吸道進入呼吸系統，如有毒氣體、農藥、花粉、吸食大麻、鴉片、嗎啡等。','吸收：通過皮膚和黏膜吸收，如脂溶性化學物質（有機磷、甲苯、酚、苯胺、四氯化碳）、氨氣、氯氣、硫化氫等。','食入：通過口部進入消化系統，如農藥、清潔劑、強酸強鹼、漂白水、有毒植物、有毒海洋生物等。','注入：皮下、肌肉或靜脈注射進入身體組織或血管，如部分植物（咬人貓、咬人狗、姑婆芋等）汁液、生物螫咬傷等；暴露途徑並不互相排斥，可能同時經多種途徑造成中毒。']}
    ], steps:[
      {type:'action', text:'到達現場評估現場安全，確定已安全才接近病人並採取適當防護措施（大量病人事件應建立現場指揮協調系統及檢傷分類）。'},
      {type:'action', text:'非外傷現場救護流程：沒有反應者也要對家屬或陪伴者詢問病史（何時食用或接觸有毒物質？病人有無其他不適？）；重點式身體檢查（註1）；輔助檢查（低血壓應建立靜脈輸液路徑維持組織灌流，血氧應維持90%以上）。'},
      {type:'action', text:'救護車內救護流程，送醫途中打開救護車窗戶以利車內通風；中毒途徑為食入之病人可採左側躺，減緩毒物經腸胃道吸收並避免嘔吐分泌物造成吸入性肺炎；呼吸窘迫或衰竭時視情況採半坐臥以維持呼吸道暢通（註2）。'}
    ], notes:[
      '<b>註1：</b>主訴意識不清時檢查瞳孔：瞳孔擴大(>4mm)考慮食入含抗乙醯膽鹼作用之植物（如大花曼陀羅、馬纓丹）、安非他命中毒或甲醇中毒；瞳孔成針狀眼(<2mm)可能為有機磷中毒或鴉片類中毒。主訴肢體疼痛時檢查全身皮膚，肢體出現紅疹疼痛腫脹潰瘍，考慮接觸造成皮膚炎之植物或化學物質，應移除患處衣物，非乾淨傷口以生理食鹽水沖洗。',
      '<b>註2：</b>在確保病人安全情況下，收集附近可能食用的殘渣或接觸過的可疑毒物、農藥容器或包裝，使用密封裝袋一併帶往醫院協助醫療人員判斷毒物種類；必要時可聯繫毒物諮詢中心（02-28717121）尋求協助，但切勿為了辨識毒物而延誤治療。'
    ]
  },
  {id:'flow-hazmat-general', dept:'S', code:'S14', title:'毒化災現場緊急救護通用流程', approved:'113年12月（新教材）', sideinfo:[
      {h:'化災管制區域劃分', list:['熱區（紅區）：危害性化學品之污染區域；未穿著完整防護者均應視為受到汙染，需給予除污。','暖區（黃區）：除污區，包含出入口管制點及入口通道，提供除污設備架設與操作；從熱區出來之傷患救災人員皆應在此接受完整除污。','冷區（綠區）：熱區暖區以外的區域，指揮官安管人員救護人員及支援備勤人員集結處，救護工作一般僅在暖區做必要急救處置，其餘處置在冷區進行。']},
      {h:'敵腐靈／六氟靈到院前使用重點', list:['敵腐靈®（Diphoterine®）：水性除污及螯合劑，用於化學性燒傷之無毒無刺激無腐蝕性除污劑，可將滲入皮膚和眼睛之化學物吸出、中和及排除；當傷患接觸酸鹼腐蝕性物質及其他不明化學物質時優先使用，沒有時以生理食鹽水沖洗眼部及皮膚患部，可持續處理患部10~15分鐘。','六氟靈®（Hexafluorine®）：針對傷患遭遇含氫氟酸物質污染時優先使用，可同時處理皮膚及眼睛燒傷；急救人員須先穿戴能抵擋氫氟酸的個人防護，並取得葡萄糖酸鈣軟膏對患部皮膚持續按摩至少15分鐘（不可直接塗抹於眼睛）。']}
    ], steps:[
      {type:'decision', text:'緊急救護現場是否安全？', branches:[
        {label:'否', outcome:'請求支援（回報救災救護指揮中心，若有火災、爆炸、毒性化學物質或不明氣體洩漏或有發生二次危害之虞，請求相關單位增援）。'},
        {label:'是', outcome:'', continue:true}
      ]},
      {type:'action', text:'危害辨識（註1）。'},
      {type:'action', text:'查閱緊急應變指南（ERG，註2）。'},
      {type:'action', text:'著上適當防護裝備（依危害性化學品之特性選擇A、B、C、D級防護裝備，註3）。'},
      {type:'action', text:'傷患除污（脫除衣物即可去除70%~90%以上化學物質附著量，再視資源採取緊急除污、概略除污或技術除污，註4）。'},
      {type:'action', text:'生命徵象評估及處置（除污通常為第一優先，但傷患情況不穩定仍需給予必要之緊急處置，不可因除污而延誤內外科急救）。'},
      {type:'action', text:'救護車內之緊急救護流程。'}
    ], notes:[
      '<b>註1：</b>一般危害辨識視現場狀況保持適當安全距離並確認災害現況；涉及化學物質運作之工廠應注意儲槽周圍告示板資訊及容器上危害標示，必要時要求管理權人提供化學品種類數量及安全資料表；裝載危險物品運輸車輛應注意車身或容器上危險物品運輸標示，向司機或押運人員索取危險物品通行證或道路運送計畫及安全資料表。',
      '<b>註2：</b>緊急應變指南依聯合國四碼編號、英文名稱、中文名稱、緊急應變處理原則、初期隔離與保護行動距離等插頁查詢；若化學物質標示填有底色代表為吸入毒性危害物質（TIH），熱區隔離距離需參照該頁面。',
      '<b>註3：</b>美國環保署將化災個人防護裝備分為A、B、C、D四級，依防護裝備對皮膚黏膜與呼吸道保護能力的綜合考量分級；第一線應變人員通常無法馬上知道確切化學品種類及濃度，實務上必須以最高規格防護為首要選擇。',
      '<b>註4：</b>緊急除污為應變人員在沒有專業設備前，利用現場任何可取得的工具進行的除污，預設以乾式除污為主，除非化學物質為固體或具腐蝕性液體才優先考慮乾式以外方式；概略除污利用現有消防設備（如水箱車並排、低水壓高流量瞄子）建立簡易除污走道快速沖洗；技術除污（醫療除污）目標是盡可能將化學物質濃度降到最低，需配合大量清水、清潔劑沖洗。'
    ]
  },
  {id:'flow-start-triage', dept:'S', code:'S15', title:'START檢傷法（大量傷病患初級檢傷）', approved:'113年12月（新教材）', sideinfo:[
      {h:'大量傷病患檢傷分類等級', list:['紅色（重傷）：第一優先，立即治療，通常傷勢嚴重會危及生命，但及時治療存活率大幅提升。','黃色（中傷）：第二優先，暫緩治療，受到顯著傷害但稍微延遲處置不會危及生命或造成嚴重後遺症。','綠色（輕傷）：第三優先，只受輕微傷勢可自行走動，延遲處理不會有問題，未受專業訓練人員也可處理。','黑色（死亡）：最後處置，多處重大創傷或已明顯死亡，即使投入資源存活率也不高。']}
    ], steps:[
      {type:'action', text:'開始檢傷，呼喊集合（可自行走動者請前往指定集結區）。'},
      {type:'decision', text:'是否可行動（可自行走動至集結區）？', branches:[
        {label:'是', outcome:'輕傷（綠色），聚集在集結處，後續進行二次檢傷。'},
        {label:'否', outcome:'', continue:true}
      ]},
      {type:'decision', text:'檢查有無呼吸？', branches:[
        {label:'無', outcome:'打開呼吸道，再次檢查呼吸；若仍無呼吸，判定為死亡（黑色）；若恢復呼吸，依呼吸次數判斷（同右側流程）。'},
        {label:'有', outcome:'', continue:true}
      ]},
      {type:'decision', text:'呼吸次數是否＞30次/分？', branches:[
        {label:'是', outcome:'重傷（紅色）。'},
        {label:'否', outcome:'', continue:true}
      ]},
      {type:'decision', text:'橈動脈搏是否摸得到，且微血管充填時間是否<2秒？', branches:[
        {label:'否（摸不到脈搏，或微血管充填時間≧2秒）', outcome:'重傷（紅色）。'},
        {label:'是', outcome:'', continue:true}
      ]},
      {type:'decision', text:'意識狀態是否可遵守簡單指示？', branches:[
        {label:'否', outcome:'重傷（紅色）。'},
        {label:'是', outcome:'中傷（黃色）。'}
      ]}
    ], notes:[
      'START意為「簡易分類並迅速治療」（Simple Triage And Rapid Treatment），為1983年美國霍格醫院急診護理人員與南加州消防局共同發展的檢傷系統，以病人客觀生理與觀察數據讓救護人員排出優先順序，適用於大量傷病患事故現場之初級檢傷。',
      '1~8歲孩童建議改用以小兒觀點發展的JumpSTART檢傷法，因其正常生理數值與成人不同。',
      '大量傷病患事件中傷患生命徵象會隨時間變化，原有傷勢可能惡化（例如黃牌轉紅牌），須反覆檢傷；不同階段可搭配不同檢傷方式（災害現場初級檢傷、治療區次級檢傷、後送前三級檢傷）。'
    ]
  },
  {id:'flow-burn-mci-triage', dept:'S', code:'S16', title:'灼燙傷大量傷病患事故建議檢傷法', approved:'113年12月（新教材）', steps:[
      {type:'decision', text:'開始檢傷，是否可行走？', branches:[
        {label:'是', substeps:[
          {type:'decision', text:'是否有顏面燒燙傷？', branches:[
            {label:'是', outcome:'重傷A（紅色）。'},
            {label:'否', outcome:'輕傷（綠色）。'}
          ]}
        ]},
        {label:'否', substeps:[
          {type:'decision', text:'是否為嚴重燒燙傷？', branches:[
            {label:'是', outcome:'重傷B（紅色）。'},
            {label:'否', outcome:'輕傷（綠色）。'}
          ]}
        ]}
      ]}
    ], notes:[
      '一般START檢傷以「能不能走動」作為輕重傷的第一道判斷依據，但灼燙傷病人常因疼痛或燒傷本身即無法行走，容易被誤判為中重傷；而顏面燒傷、呼吸道灼傷等真正可能致命的情形，卻可能因病人尚能行走而被START流程漏掉。因此本檢傷法改以「是否有顏面燒燙傷」及「是否為嚴重燒燙傷」作為判斷依據，此經驗係源自八仙樂園粉塵暴燃事件的檢傷檢討。',
      '嚴重燒燙傷之判斷可參考灼燙傷嚴重度分類（詳見T4「灼燙傷外傷病人到院前處置流程」側欄）：成人二度灼燙傷面積>25%、三度灼燙傷面積>10%，或合併吸入性灼燙傷、外傷、其他慢性疾病等屬重度。'
    ]
  },
  {id:'flow-tca', dept:'T', code:'T1', title:'創傷心肺功能停止流程', approved:'115年函頒（南投縣預立流程）＋113年12月（新教材到院前創傷心臟停止流程整合）', steps:[
      {type:'decision', text:'評估傷病患是否為非創傷原因導致心肺功能停止（註1）？', branches:[
        {label:'是', outcome:'依無脈搏流程處置（註2）。'},
        {label:'否', outcome:'', continue:true}
      ]},
      {type:'decision', text:'是否有立即可見且持續性之大出血（註3）？', branches:[
        {label:'是', outcome:'立即給予止血處置。', continue:true},
        {label:'否', outcome:'', continue:true}
      ]},
      {type:'action', text:'胸部按壓減少中斷，儘速使用AED；同時專注於處置其他可逆導致心肺功能停止之原因（註4）：確保呼吸道以及最大氧合；骨盆固定；<span class="p-badge">P</span>氣管內管插管；<span class="p-badge">P</span>雙側針刺減壓；<span class="p-badge">P</span>TXA；<span class="p-badge">P</span>Epinephrine。'},
      {type:'decision', text:'是否建議去顫（可電擊心律）？', branches:[
        {label:'是', outcome:'去顫後持續高品質CPR，給予氧氣、使用輔助呼吸道。'},
        {label:'否', outcome:'持續高品質CPR，給予氧氣、使用輔助呼吸道。'}
      ]},
      {type:'action', text:'持續執行高品質CPR，收拾救護器材、上擔架床，盡速送醫（註5）。'}
    ], notes:[
      '<b>註1：</b>救護技術員依現場環境、創傷機轉、評估判斷可能導致心肺功能停止之原因。',
      '<b>註2：</b>如無法判斷原因，則依非創傷心肺功能停止處理原則處置（見M1 到院前心臟停止流程）；救護技術員可隨時依當下判斷選擇適當之處置流程及原則。',
      '<b>註3：</b>外傷病人發生大出血情形，體內血容積量會快速下降，若此時心臟停止，應儘早處理止血並執行高品質CPR，以期達到急救的效果。',
      '<b>註4：</b>救護技術員應考量現場救護能量以及後送距離、時間，以傷病患最大福祉為考量進行處置，應盡可能同時治療可逆原因，如現場救護資源不足，可優先於胸部按壓。',
      '<b>註5：</b>本流程與非創傷心臟停止處置原則大致相同，差別在於儘速就醫（Load and Go）及止血，並於爭取時間同時降低二次傷害，儘速轉送往急救責任醫院或就近適當醫療機構。'
    ]
  },
  {id:'flow-infect', dept:'S', code:'S17', title:'傳染病病人的救護處置流程', approved:'113年12月（新教材）', sideinfo:[
      {h:'標準防護措施要點', list:['手部衛生時機：接觸病人之前／執行無菌操作技術之前／有暴觸於病人體液風險之後／接觸病人之後／接觸病人周遭環境之後；建議優先使用酒精性乾洗手液，明顯髒污或沾血時須濕洗手。','個人防護裝備：手套（預期接觸血液體液黏膜組織時）、隔離衣（預期接觸血液體液分泌物排泄物時）、口罩／護目鏡／臉部防護具（可能有噴濺或飛沫產生時）。','呼吸道衛生／咳嗽禮節：打噴嚏及咳嗽使用衛生紙或適當方式遮掩口鼻，咳嗽病人應戴上外科口罩。']}
    ], steps:[
      {type:'action', text:'非創傷現場救護流程判定為傳染病病患（若懷疑或被確認病人有傳染病時即應進入本流程）。'},
      {type:'action', text:'採取標準防護措施（依暴露情形選用手套、隔離衣、口罩、眼睛或臉部防護具等個人防護裝備，並執行安全注射）。'},
      {type:'action', text:'判定可能傳染途徑，並依途徑採取對應防護裝備：<br>‧接觸傳染（手套、隔離衣）—適用膿瘡、諾羅病毒、輪狀病毒、疥瘡等。<br>‧飛沫傳染（外科口罩）—適用百日咳、流感、腮腺炎、德國麻疹、SARS等。<br>‧空氣傳染（N95或高效能口罩，須確實檢查口罩密合度）—適用肺結核、麻疹、水痘等。'},
      {type:'action', text:'上擔架床。'},
      {type:'action', text:'救護車內救護流程。'}
    ], notes:[
      '依衛生福利部疾病管制署將法定及新興傳染病分為五大類，報告期限依類別自24小時至一個月不等，法定傳染病分類會隨時空調整，最新資訊請依據疾病管制署公告調整（https://www.cdc.gov.tw/）。',
      'COVID-19已於2024年5月降階為第四類法定傳染病；若無經飛沫、接觸或空氣途徑之人對人傳染證據，則使用標準防護措施即可（例如蜂窩性組織炎、尿道感染等）。',
      '需和病人有直接接觸的救護技術員，工作時不應穿戴人工指甲，並應經常修剪指甲，維持指甲尖端長度不超過0.5公分。'
    ]
  },
  {id:'flow-trauma-shock', dept:'T', code:'T2', title:'外傷出血性休克救護流程', approved:'113年12月（新教材）', sideinfo:[
      {h:'出血特性', list:['動脈出血：出血量多且快，不易止血。','靜脈出血：相對緩慢且量少，止血比較容易。','微血管出血：通常是緩慢滲漏，直接加壓即可有效處理；若出血無法有效控制，將導致休克。']},
      {h:'外傷休克分類', list:['出血性休克：外傷最常見的休克，與出血量多寡有關。','心因性休克：與心臟功能受損有關，如心肌挫傷、心臟損傷。','神經性休克：通常與神經損傷有關，造成交感神經系統失效，如脊椎受傷病人。','阻塞性休克：因不正常的氣體、液體壓迫心臟或栓塞造成，例如心包膜填塞、張力性氣胸與肺動脈栓塞。','過敏性休克：由嚴重過敏反應所造成，通常與食物、藥物或昆蟲螫咬傷有關。','敗血性休克：因感染或身體嚴重發炎造成敗血症而導致。']}
    ], steps:[
      {type:'action', text:'外傷病人緊急救護現場流程判定為休克外傷病人。'},
      {type:'decision', text:'是否有立即可見且持續性之外出血情形？', branches:[
        {label:'是', outcome:'止血處置。', continue:true},
        {label:'否', outcome:'', continue:true}
      ]},
      {type:'action', text:'相關休克之重點式身體檢查（註1）。'},
      {type:'action', text:'相關休克之處置（註2）。'},
      {type:'action', text:'上擔架床，依傷病狀況給予坐臥、半坐臥、平躺或其他方式，並保護病人隱私。'},
      {type:'action', text:'救護車內救護流程。'}
    ], notes:[
      '<b>註1：</b>評估意識（情緒焦慮、躁動、意識程度改變須高度懷疑腦部缺氧或損傷）；評估呼吸道（意識不清需評估是否暢通、過敏性休克可能支氣管收縮、黏液分泌變多）；評估呼吸（休克初期呼吸變快變深，嚴重時血氧明顯下降）；評估循環（脈搏加快、收縮壓下降、膚色蒼白發紺、末端肢體濕冷、微血管充填時間＞2秒或周邊脈搏摸不到）；評估失能（以GCS量化腦部受傷程度）；評估身體（檢查是否有致命性傷害造成休克之可能性）；輔助檢查（血壓、血氧、脈搏、體溫、血糖、瞳孔大小、聽診肺音；休克指數〔心跳/收縮壓〕＞1時應懷疑有休克）。',
      '<b>註2：</b>解除組織缺氧現象（優先評估呼吸道及呼吸動力，必要時儘早建立呼吸道並給氧）；減少血液喪失（止血、包紮、骨折固定）；增加周邊循環能力（完成初步評估後實施靜脈注射，乳酸林格氏液為首選、其次生理食鹽水，成人首次輸液以1公升為限，體重小於40公斤兒童可給予20ml/kg，未確實止血前應避免大量輸液造成血液稀釋、凝血功能下降）；維持體溫（使用毛毯或急救毯保暖，避免低體溫）；擺放適當姿勢上擔架床並保護病人隱私。'
    ]
  },
  {id:'flow-wound', dept:'T', code:'T3', title:'傷口處理救護流程', approved:'113年12月（新教材）', sideinfo:[
      {h:'傷口類型', list:['挫傷：可造成腫、痛、瘀血等症狀。','皮下血腫：挫傷後血液堆積在皮膚組織下方。','擦傷：堅硬物體摩擦造成，皮膚被摩擦刮除。','撕裂傷：鈍力撞擊或拉扯造成，傷口邊緣不規則，可能伴隨大量出血。','切割傷：尖銳物造成，傷口邊緣較整齊，可能伴隨大量出血。','穿刺傷：尖銳物或高速物質造成，傷口通常較小，但可能合併深部組織器官重大傷害。','咬傷：人或動物造成，傷口因口腔染污容易感染。','剝離傷：整層皮膚以上的組織部分或完全喪失，通常為強大外力造成，例如機器拉扯。']},
      {h:'止血帶使用時機', list:['傷口出血呈現搏動性（脈衝性）或持續性出血。','血液在地上聚積成池（大量出血時）。','覆蓋在傷口上的衣服被血液浸濕。','覆蓋傷口的彈性繃帶加壓止血無效。','手臂或小腿部及其以上的外傷性截肢。']}
    ], steps:[
      {type:'action', text:'檢視傷口類型及嚴重度。'},
      {type:'decision', text:'是否為立即可見且持續之外出血？', branches:[
        {label:'是', outcome:'加壓止血（至少五分鐘，先不考慮清潔傷口）；若持續出血則再加壓止血或改用彈性繃帶加壓，仍無法控制出血時考慮止血帶止血法（註1）。', continue:true},
        {label:'否', outcome:'清潔傷口（非乾淨傷口以生理食鹽水沖洗）。', continue:true}
      ]},
      {type:'action', text:'覆蓋敷料後包紮（註2）。'},
      {type:'action', text:'判斷是否骨折（懷疑骨折之病人均應給予骨折固定）。'},
      {type:'decision', text:'該姿勢是否阻礙固定或搬運？', branches:[
        {label:'否', outcome:'以原姿勢固定。', continue:true},
        {label:'是', outcome:'嘗試拉直後再固定。', continue:true}
      ]},
      {type:'action', text:'固定前、後檢視周邊循環及神經系統（患肢遠端脈搏、感覺及運動功能）。'}
    ], notes:[
      '<b>註1：</b>止血帶使用方式：將止血帶繞過肢體，定位在出血部位上方5-8公分，若最近端出血部位不易確認則放置於肢體上方最高位置；拉緊止血帶至三指尖端無法滑入帶子與肢體之間；扭轉手柄直到出血停止且遠端脈搏摸不到；固定手柄並記錄綁上止血帶的時間。',
      '<b>註2：</b>傷口處理順序為：傷口辨識→止血→清潔→覆蓋敷料→包紮→固定。對於穿刺傷異物應先固定並避免拔除，若胸部穿刺異物已遭拔除，需考慮是否有氣胸之可能性；敷料若被血滲透，不可拆掉原敷料，應由外面繼續覆蓋。'
    ]
  },
  {id:'flow-burn', dept:'T', code:'T4', title:'灼燙傷外傷病人到院前處置流程', approved:'113年12月（新教材）', sideinfo:[
      {h:'灼燙傷深度', list:['一度：傷及表皮，皮膚外觀紅、乾，有疼痛感。','二度：傷及表皮至真皮乳頭層或基底層，皮膚紅濕或白乾、有水泡，疼痛或不敏感。','三度：傷及表皮至真皮全層或更深至皮下組織、肌肉筋膜、骨膜、骨頭，皮膚死白、焦黑、焦痂或乾硬如皮革，感覺消失。']},
      {h:'灼燙傷面積評估', list:['九的原則：適用成人及大於10歲小兒之較大範圍灼傷，成人頭頸9%、前後軀幹各18%、單上肢9%、單下肢18%、外陰部1%；小兒頭頸18%、單下肢14%。','手掌原則：適用成人及兒童小於10%或不規則之灼傷，病人手掌（含五指）體表面積約佔全身1%。']},
      {h:'灼燙傷損傷機轉', list:['休克：大面積灼燙傷使體液快速喪失，導致低血容休克。','體溫喪失：皮膚無法保持體溫，特別是夜晚或氣溫低時。','感染：失去皮膚保護功能，易引發敗血症相關問題。']}
    ], steps:[
      {type:'action', text:'外傷病人緊急救護現場流程判定為灼燙傷病患，排除熱源及不穩定因素，儘速離開不穩定現場環境直到安全處。'},
      {type:'decision', text:'是否為化學灼燙傷、輻射灼燙傷？', branches:[
        {label:'是', outcome:'除污處置（穿戴足夠安全防護，沾染衣物小心移除，粉狀化學物質先以乾淨毛刷刷除污染物再用大量清水沖洗）。', continue:true},
        {label:'否', outcome:'', continue:true}
      ]},
      {type:'action', text:'重點式身體檢查（移除身上所有燒灼衣物，但切勿撕開黏著在皮膚上之衣物）。'},
      {type:'action', text:'量測血壓及血氧濃度等輔助檢查（密閉空間灼傷病人應給予非再吸入型氧氣面罩，呼吸窘迫給予高濃度氧氣後SpO2仍<90%且意識惡化時應以BVM人工呼吸）。'},
      {type:'action', text:'評估灼燙傷深度與範圍（註1）。'},
      {type:'action', text:'給予氧氣等必要處置。'},
      {type:'action', text:'灼燙傷口處置（依單項救護技術操作規範處置，防止組織進一步灼傷、防止感染）。'},
      {type:'action', text:'<span class="p-badge">P</span>靜脈輸液注射（乳酸林格氏液為首選，若無則可用生理食鹽水取代；註2）。'},
      {type:'action', text:'救護車內救護流程，送達有適當灼傷處理能力的急救責任醫院（中度或嚴重灼傷應送有灼傷處理能力之急救責任醫院或具灼傷中心之醫院）。'}
    ], notes:[
      '<b>註1：</b>灼燙傷嚴重度綜合灼傷種類、深度、範圍、部位、病人年齡、原有疾病及伴隨併發症判定；臉、眼、耳、頸、手、足、會陰部灼燙傷，合併吸入性灼燙傷、合併外傷、合併其他慢性疾病者，屬中重度以上。',
      '<b>註2：</b>輸液補充可採「修正後布魯克公式」：24小時靜脈輸液量＝2ml×傷患體重(Kg)×灼燙傷面積(%)（一度灼燙傷不列入計算），其中前8小時給一半量，後16小時再給另一半量；或採十的法則，將灼燙傷面積四捨五入後乘以10即為每小時輸液量。不論採何種方式估算，仍須依病人對輸液的反應調整輸液量。'
    ]
  },
  {id:'flow-head-trauma', dept:'T', code:'T5', title:'頭部外傷救護流程', approved:'113年12月（新教材）', sideinfo:[
      {h:'頭部常見致命性傷口', list:['槍傷、刀傷、大而深的傷口。','頭部血腫或腫脹、嚴重撕裂傷。','骨折、異物穿刺、腦部組織外露等。']},
      {h:'處置口訣', list:['給氧氣：血氧維持＞90~94%。','顧血壓：收縮壓＞110mmHg，以維持腦部灌流。','ET保四十：EtCO2維持35~40mmHg，確保不低於30mmHg。','換氣莫太快：成人每分鐘約10口氣，小兒每分鐘約20口氣，嬰兒（<1歲）每分鐘約25口氣。']}
    ], steps:[
      {type:'action', text:'外傷病人緊急救護現場流程判定為頭部外傷病人（頭部／顏面部／眼耳鼻喉部有致命性傷口或明顯傷）。'},
      {type:'decision', text:'是否有致命性傷口？', branches:[
        {label:'是', outcome:'致命性傷口之必要處置（註1）。', continue:true},
        {label:'否', outcome:'', continue:true}
      ]},
      {type:'action', text:'相關受傷部位之重點式身體檢查（註2）。'},
      {type:'action', text:'測量血壓及血氧濃度等輔助檢查（每5分鐘重複評估生命徵象、昏迷指數、血氧、瞳孔大小、已給輸液量）。'},
      {type:'action', text:'上擔架床（若無頸椎受傷問題，可採半坐臥或坐姿以減輕腦部壓力）。'},
      {type:'action', text:'救護車內救護流程。'}
    ], notes:[
      '<b>註1：</b>大而深傷口、嚴重撕裂傷應避免傷口污染並直接加壓止血，但若出血處有頭骨凹陷、懷疑開放性顱頭骨骨折時不可直接施加壓力；有休克症狀應給予靜脈輸液；異物插入組織不可強行移除，應固定止血後儘速送醫。',
      '<b>註2：</b>控制致命性外出血；未排除頸椎受傷前應給予頸椎減移；評估意識（情緒焦慮、意識程度變化須高度懷疑腦部損傷）；評估呼吸道（維持頸椎減移前提下維持呼吸道通暢並給予足夠氧氣，準備大口徑抽吸管，未能排除頸椎受傷時以下顎推舉法優先）；評估呼吸（急性頭部外傷常見庫欣現象－血壓升高、呼吸型態改變、心跳變慢，輔助通氣速率成人10次/分、兒童20次/分、嬰兒25次/分）；評估循環（考慮出血性休克、神經性休克，維持收縮壓至少110mmHg以保腦部灌流）；評估失能（雙側瞳孔大小與對光反應、GCS<12或<15且持續變差、多重外傷需插管、外傷後癲癇適用本處置口訣）；評估身體。'
    ]
  },
  {id:'flow-facial-trauma', dept:'T', code:'T6', title:'顏面外傷病人緊急救護處置流程', approved:'113年12月（新教材）', sideinfo:[
      {h:'名詞解釋', list:['浣熊眼（Raccoon\'s eyes）：因蝶竇底部骨折造成眼眶周圍瘀青，須懷疑前顱底骨骨折。','巴氏徵候（Battle\'s sign）：耳後乳突瘀青，須懷疑後顱底骨骨折。']},
      {h:'顏面骨骨折種類', list:['下顎骨骨折：除鼻骨外最常見，可能咬合不正、下巴麻木、嘴巴張不開。','臉中央骨骨折：包含上頜骨、顴骨、下眼眶骨及鼻骨，容易合併腦神經及脊髓損傷。','顴骨骨折：一旦骨折代表撞擊力很強，多合併眼眶骨骨折。','眼眶骨骨折：眼眶最脆弱部位在底部，骨折時眼球內含物易陷入上頷竇內。','鼻骨骨折：顏面骨中最常見的骨折，可見鼻子變形、腫脹及流鼻血。']}
    ], steps:[
      {type:'action', text:'外傷病人緊急救護現場流程判定為顏面部外傷病人。'},
      {type:'decision', text:'是否有致命性傷口？', branches:[
        {label:'是', outcome:'致命性傷口之必要處理（註1）。', continue:true},
        {label:'否', outcome:'', continue:true}
      ]},
      {type:'action', text:'相關受傷部位之重點式身體檢查（註2）。'},
      {type:'action', text:'測量血壓及血氧濃度等輔助檢查。'},
      {type:'action', text:'上擔架床（若無頸椎受傷問題，可採半坐臥或坐姿減輕腦部壓力）。'},
      {type:'action', text:'救護車內救護流程。'}
    ], notes:[
      '<b>註1：</b>大而深傷口、嚴重撕裂傷應避免傷口污染並直接加壓止血；眼眶瘀青或鼻漏須懷疑前顱底骨折，耳漏須懷疑中顱底骨折，耳後瘀青（巴氏徵候）須懷疑後顱底骨折；容易因出血、嘔吐物及斷裂牙齒造成呼吸道阻塞，須以抽吸、口咽、鼻咽或聲門上呼吸道維持呼吸道通暢；異物留在顏面時絕對不可任意拔除。',
      '<b>註2：</b>未排除頸椎受傷前應給予頸椎減移；口鼻明顯且持續出血時，意識清醒且排除頸椎受傷者應讓病人坐起身體向前傾，意識不清則視為頸椎損傷予以減移；顏面附屬器官（耳、眼、牙）損傷，可用潤濕生理食鹽水紗布覆蓋，剝離傷未完全掉落先擺回原位再覆蓋包紮，已完全剝離則以濕紗布包覆後置入乾淨袋子並放入冰水中。'
    ]
  },
  {id:'flow-eent-trauma', dept:'T', code:'T7', title:'眼耳鼻喉急症與外傷緊急救護處置流程', approved:'113年12月（新教材）', steps:[
      {type:'action', text:'外傷病人緊急救護現場流程判定為眼耳鼻喉部外傷病人。'},
      {type:'decision', text:'是否有致命性傷口？', branches:[
        {label:'是', outcome:'致命性傷口之必要處理（註1）。', continue:true},
        {label:'否', outcome:'', continue:true}
      ]},
      {type:'action', text:'相關受傷部位之重點式身體檢查（註2）。'},
      {type:'action', text:'測量血壓及血氧濃度等輔助檢查。'},
      {type:'action', text:'上擔架床（若無頸椎受傷問題，可採半坐臥或坐姿減輕腦部壓力）。'},
      {type:'action', text:'救護車內救護流程。'}
    ], notes:[
      '<b>註1：</b>眼耳鼻喉部有槍傷、穿刺傷、刀傷、大而深的傷口時，除處置傷口外須考慮外傷機轉造成的其他部位受傷是否影響生命徵象；有休克症狀應給予靜脈輸液，異物插入組織不可強行移除，應固定及止血後儘速送醫。',
      '<b>註2：</b>眼部：檢查視力（強酸強鹼灼傷須立即以大量清水沖洗）、瞳孔反應、眼球運動，隱形眼鏡不隨便拔除（化學灼傷時可在醫療指導下拔除）。耳部：撕裂挫傷直接加壓止血並冰敷消腫；低溫傷害包紮避免感染；化學性傷害以大量清水沖洗；耳膜破裂通常自然恢復但仍建議送醫，異物穿刺不可拔除。鼻部：出血以拇指食指捏鼻翼至少10分鐘並冰敷鼻骨處止血；鼻內異物切勿自行取出。口部：牙齒斷裂應在口腔內積極尋找避免吸入或呼吸道阻塞，脫落恆牙2小時內放入冰牛奶或生理食鹽水中送醫，僅可拿牙冠處。喉部：處理喉部外傷首要維持上呼吸道暢通，出血採局部壓迫止血，異物穿刺不可自行移除；皮下氣腫應讓病人鎮靜緩慢深呼吸，給氧避免使用甦醒球以免加重皮下氣腫。'
    ]
  },
  {id:'flow-spine-trauma', dept:'T', code:'T8', title:'脊椎外傷病人緊急救護處置流程', approved:'113年12月（新教材）', sideinfo:[
      {h:'應假設脊椎已損傷之受傷機轉', list:['頭、頸、軀幹或骨盆受到劇烈撞擊（例如被壓在倒塌結構、遭受外力襲擊）。','造成頸部或軀幹加速、減速或側彎之機轉（例如中高速交通碰撞、行人被撞倒、爆炸）。','任何高度之墜落或跌倒，尤其是老年人。','從機踏車或任何動力驅動之交通工具中彈出或摔落。','淺水處跳水事件。']},
      {h:'明顯脊椎損傷徵象', list:['明顯的頭部或脊椎外傷、主述頸部疼痛、脊椎痛。','四肢麻或無力、損傷處以下雙側或部分癱瘓。','頸部穿刺傷或鎖骨以上傷口、意識不清、神經性休克。','男性陰莖持續勃起、脊椎解剖學上的變形等徵象。']}
    ], steps:[
      {type:'action', text:'外傷病人緊急救護現場流程判定為脊椎外傷病人。'},
      {type:'decision', text:'是否有明顯脊椎損傷徵象？', branches:[
        {label:'是', outcome:'脊椎損傷之必要處理（給予頸圈、長背板等脊椎保護固定器材，給予氧氣及維持靜脈輸液灌流，迅速後送有能力處理之急救責任醫院）。', continue:true},
        {label:'否', outcome:'', continue:true}
      ]},
      {type:'action', text:'相關脊椎外傷之重點式身體檢查（檢查背部是否有瘀傷、傷口或壓痛）。'},
      {type:'action', text:'測量血壓及血氧濃度等輔助檢查。'},

      {type:'action', text:'救護車內救護流程（註2）。'}

      '<b>註2：</b>符合危急個案之脊椎外傷病人應轉送至有外傷中心或有能力處理之急救責任醫院；利用長背板固定之病人，送醫途中如遇嘔吐，應將病人與背板同時斜向一側（保持頭部與身體成一直線），以避免造成吸入性肺炎。'
    ]
  },
  {id:'flow-chest-trauma', dept:'T', code:'T9', title:'胸部外傷病人緊急救護流程', approved:'113年12月（新教材）', sideinfo:[
      {h:'外傷導致呼吸困難常見原因', list:['呼吸道阻塞：喘鳴聲、鼾聲或吵雜聲，須立即打開呼吸道，否則有致命危險。','開放性氣胸：胸壁開放性傷口，胸壁缺損越大氣流越快進入胸腔，呼吸困難、呼吸時起伏不對稱、發紺、脈搏加快、休克。','張力性氣胸：如同單向閥，患側內壓力持續增加壓迫肺部塌陷並將縱膈、氣管往對側擠壓，呼吸困難、氣管偏向對側、患側呼吸音變小或聽不到、頸靜脈怒張、脈搏快且弱、休克、扣診鼓音。','氣管支氣管破裂：大量空氣從破裂處流入肋膜腔或縱膈腔形成張力性氣胸，明顯痛苦、呼吸加速費力、膚色蒼白、冒汗、血氧飽和度低、血壓低、咳血。','大量血胸：1500毫升以上血液進入肋膜腔，心搏過速、呼吸困難、意識紊亂、傷側呼吸音減弱或消失、扣診濁音、頸靜脈塌陷、低血容休克。','心包膜填塞：血液或液體急速累積在心包膜與心臟之間，貝克氏三徵候－低血壓（休克）、頸靜脈怒張、心音模糊。']}
    ], steps:[
      {type:'action', text:'外傷病人緊急救護現場流程判定為胸部外傷病人。'},
      {type:'decision', text:'胸部是否有致命性傷口，或外傷導致呼吸困難症候群？', branches:[
        {label:'是', outcome:'致命胸部外傷必要處置（註1）。', continue:true},
        {label:'否', outcome:'', continue:true}
      ]},
      {type:'action', text:'相關受傷部位之重點式身體檢查（視診呼吸時胸部起伏是否對稱、觸診壓痛、聽診兩側肺音，注意連枷胸徵象－註2）。'},
      {type:'action', text:'測量血壓及血氧濃度等輔助檢查。'},
      {type:'action', text:'上擔架床（建議坐臥或半坐臥）。'},
      {type:'action', text:'救護車內救護流程（符合危急個案應轉送至有外傷中心或有能力處理之急救責任醫院）。'}
    ], notes:[
      '<b>註1：</b>血氧濃度＜94%給予氧氣；呼吸道阻塞有鼾音時以徒手或輔助呼吸道維持暢通，有雜音時考慮抽吸；開放性氣胸使用不透氣敷料貼3邊留1邊，或使用胸部商品化密封件；懷疑張力性氣胸儘速送醫，可用院前超音波確認但不應影響送醫時間；懷疑氣管支氣管破裂儘速送醫；大量血胸給予高濃度氧氣並給予大量輸液；心包膜填塞給予輸液以增加靜脈壓改善心輸出量。',
      '<b>註2：</b>連枷胸：兩根以上相鄰肋骨每根骨折至少兩處，肋骨失去兩端支持與胸廓依附，造成呼氣時胸壁凸出、吸氣時胸壁凹陷的奇異式呼吸運動，減少換氣。'
    ]
  },
  {id:'flow-abd-trauma', dept:'T', code:'T10', title:'腹部外傷病人緊急救護流程', approved:'113年12月（新教材）', sideinfo:[
      {h:'特定腹部器官損傷常見症候', list:['脾臟損傷：左上腹傷口、腹痛、腹脹及休克，常合併左下胸廓損傷（左側第10~12肋骨骨折），疼痛可能放射至左肩。','肝臟損傷：右上腹傷口、腹痛、腹脹及休克，常合併右下胸廓損傷（右側第8~12肋骨骨折），疼痛可能放射至右肩。','小腸損傷：腹部疼痛，身體檢查沒有腹膜炎徵候並不能排除小腸損傷的可能。','胰臟／十二指腸損傷：常見於方向盤或機踏車把手直接撞擊上腹部，上腹部瘀青、傷口、疼痛並放射至背部。','腎臟損傷：常見於腰、背部直接受外力撞擊，腰背部瘀青、傷口、疼痛及血尿。','骨盆骨折：骨盆疼痛及壓痛、會陰瘀青、陰囊腫脹瘀青、尿道口有血與骨盆不穩定，不穩定骨盆骨折可能傷及膀胱、尿道、直腸、子宮及陰道，甚至造成後腹腔大量出血危及生命。']}
    ], steps:[
      {type:'action', text:'外傷病人緊急救護現場流程判定為腹部外傷病人。'},
      {type:'decision', text:'腹部是否有致命性傷口，或特定腹部外傷症候群？', branches:[
        {label:'是', outcome:'致命腹部外傷必要處置（註1）。', continue:true},
        {label:'否', outcome:'', continue:true}
      ]},
      {type:'action', text:'相關腹部外傷之重點式身體檢查（視診是否有瘀傷、傷口或鼓脹，觸診是否有壓痛；腰側或肚臍周圍瘀傷可能表示後腹腔出血，必要時以攜帶型腹部超音波FAST評估）。'},
      {type:'action', text:'測量血壓及血氧濃度等輔助檢查。'},
      {type:'action', text:'上擔架床（建議平躺並屈膝）。'},
      {type:'action', text:'救護車內救護流程（符合危急個案應轉送至有外傷中心或有能力處理之急救責任醫院）。'}
    ], notes:[
      '<b>註1：</b>血氧濃度＜94%給予氧氣；臟器外露以潤濕無菌紗布覆蓋、適當敷料覆蓋後包紮，不可嘗試將臟器塞回體內；腹部穿刺傷穿刺物未移除時切勿移除，應妥善固定或截短，避免搖晃造成二次傷害或再出血；有休克現象應給予出血控制並給予適當輸液，無創傷性腦損傷情況下維持目標收縮壓80至90毫米汞柱，不需恢復正常範圍，過高血壓可能再次誘發出血；不穩定骨盆骨折應優先使用產品化骨盆固定帶，無此設備時可考慮使用KED器材或大件被單包覆固定。'
    ]
  },

      {h:'肢體外傷常見型式', list:['擦傷：出血量不多，傷口常留有污物、砂粒，容易感染。','撕裂傷：巨大外力碰撞造成，傷口不規則，常易感染，嚴重者需縫合。','穿刺傷：尖銳物插入造成，可能傷及體內器官造成內出血。','扭傷：關節或韌帶突然扭轉、過度伸張，處置原則為PRICE（保護、休息、冰敷、壓迫、抬高）。','拉傷：肌腱或肌肉過度伸張或屈曲，處置原則同PRICE，必要時施以夾板固定。','骨折：直接或間接外力、扭力或瞬間強大肌肉收縮力造成，症候包括疼痛、局部腫脹、瘀血、壓痛、骨擦音、肢體變形或變短。','脫臼：兩骨骼間關節分開，維持關節穩定性的韌帶產生嚴重分裂而位移。']},
