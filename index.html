function renderDetail(cat, id, scenarioIdx, opts){
  window.scrollTo(0, 0);
  scenarioIdx = scenarioIdx||0;
  opts = opts || {};
  const fromSearch = opts.fromSearch || (state.view==='detail' && state.fromSearch) || false;
  const searchQ = opts.searchQ != null ? opts.searchQ : (fromSearch ? (state.searchQ || '') : '');
  const item = DATA[cat] && DATA[cat].find(x=>x.id===id);

  if(!item){
    state = {view:'detail', cat, id, fromSearch, searchQ};
    backbar.classList.add('show');
    backlabel.textContent = fromSearch ? '返回搜尋結果' : '返回';
    app.innerHTML = `<div class="empty">找不到此項目</div>`;
    return;
  }

  if(cat==='flowcharts' || (item.steps && item.steps.length)){
    state = {view:'detail', cat, id, dept:item.dept || 'S', fromSearch, searchQ};
    backbar.classList.add('show');
    if(fromSearch){
      backlabel.textContent = '返回搜尋結果';
    } else if(cat==='flowcharts'){
      backlabel.textContent = '返回' + DEPT_LABEL[item.dept];
    } else {
      backlabel.textContent = '返回' + catLabel(cat);
    }
    renderFlowchartDetail(item);
    return;
  }

  state = {view:'detail', cat, id, scenarioIdx, fromSearch, searchQ};
  backbar.classList.add('show');
  backlabel.textContent = fromSearch ? '返回搜尋結果' : ('返回' + catLabel(cat));

  const sc = item.scenarios[scenarioIdx];
  const tabs = item.scenarios.length>1 ? `
    <div class="tabbar">
      ${item.scenarios.map((s,i)=>`<div class="tab ${i===scenarioIdx?'active':''}" data-i="${i}">${s.title}</div>`).join('')}
    </div>` : '';

  app.innerHTML = `
    <div class="detail-head">
      <h2>${item.name}</h2>
      ${item.en ? `<div class="en">${item.en}</div>` : ''}
    </div>
    ${tabs}
    ${onlinePillWrap(sc.online)}
    ${sc.online==='yes' ? medDirectorField(item.id) : ''}
    ${sc.approved ? `<div class="meta-row"><span class="meta-chip">修正日期：${sc.approved}</span>${item.scenarios.length>1?`<span class="meta-chip">情境：${sc.title}</span>`:''}</div>` : ''}
    ${sc.sections.map(renderSection).join('')}
  `;
  if(item.scenarios.length>1){
    app.querySelectorAll('.tab').forEach(t=>{
      t.addEventListener('click', ()=> renderDetail(cat, id, parseInt(t.dataset.i), {fromSearch, searchQ}));
    });
    const activeTab = app.querySelector('.tab.active');
    if(activeTab){
      activeTab.scrollIntoView({inline:'center', block:'nearest', behavior:'auto'});
    }
  }
}

function buildInnerStepsHtml(steps){
  let html = '';
  steps.forEach((step, i)=>{
    html += fgNode(step);
    if(i < steps.length-1) html += '<div class="fg-arrow small"></div>';
  });
  return html;
}

function fgNode(step){
  if(step.type==='action'){
    return `<div class="fg-action">${step.text}</div>`;
  }
  const branchesHtml = step.branches.map(b=>{
    const lab = b.label.trim();
    const cls = lab.startsWith('是') ? 'yes' : (lab.startsWith('否') ? 'no' : 'neutral');
    const hasText = b.outcome && b.outcome.trim().length>0;
    const contTag = b.continue ? `<div class="fg-continue-tag">↓ 依此路徑接續主流程</div>` : '';
    const nested = b.substeps ? `<div class="fg-branch-lane">${buildInnerStepsHtml(b.substeps)}</div>` : '';
    return `
      <div class="fg-branch ${b.substeps?'is-lane':''}">
        <div class="fg-branch-label ${cls}">${b.label}</div>
        <div class="fg-arrow small"></div>
        ${hasText ? `<div class="fg-outcome ${b.continue?'is-continue':'is-leaf'}">${b.outcome}</div>` : ''}
        ${nested}
        ${contTag}
      </div>`;
  }).join('');
  return `<div class="fg-decision">${step.text}</div><div class="fg-branches">${branchesHtml}</div>`;
}

function buildGraphHtml(steps){
  let graph = '';
  steps.forEach((step, i)=>{
    graph += fgNode(step);
    if(i < steps.length-1) graph += '<div class="fg-arrow"></div>';
  });
  return graph;
}

function escapeHtml(s){
  return String(s)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#39;');
}

function kwMatches(kw, q){
  const ql = q.toLowerCase();
  if(!ql) return false;
  // 短英文／數字關鍵字改為近似整詞比對，避免 mi／vt 等子字串誤中
  if(/^[a-z0-9]+$/i.test(q) && q.length <= 3){
    const esc = ql.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
    return new RegExp('(?:^|[^a-z0-9])' + esc + '(?:[^a-z0-9]|$)').test(kw);
  }
  return kw.includes(ql);
}

  ['胺甲環酸','TXA'],
  ['快速創傷評估','FAST'],
  ['大量傷病患檢傷','START'],
  ['事故指揮系統','ICS'],
  ['團隊資源管理','TRM'],
  ['精神危機處理團隊','CIT'],
  ['METHANE口訣','災難通報','methane'],
  ['經皮體外心臟節律器','TCP'],
  ['雙重接續去顫','DSED'],
  ['個人防護裝備','PPE'],
  ['超音波','POCUS','E-FAST','SONO','手持式超音波'],
  ['頭部外傷','TBI','創傷性腦損傷','traumatic brain injury']
];

function expandSynonyms(kw){
  let extra = '';
  SYNONYM_GROUPS.forEach(group=>{
    const hit = group.some(term=> kw.includes(term.toLowerCase()));
    if(hit) extra += ' ' + group.join(' ');
  });
  return (kw + extra).toLowerCase();
}

function sectionHeaders(scenarios){
  return scenarios.map(s=> s.sections.map(sec=>sec.h).join(' ')).join(' ');
}

function flattenSearchIndex(){
  const idx = [];
  DATA.techniques.forEach(it=>{
    const raw = (it.name+' '+it.en+' '+it.scenarios.map(s=>s.title).join(' ')+' '+sectionHeaders(it.scenarios)).toLowerCase();
    idx.push({cat:'techniques', id:it.id, label:it.name, sub:'救護技術 · '+(it.en||''), kw:expandSynonyms(raw)});
  });
  DATA.guidelines.forEach(it=>{
    const raw = (it.name+' '+it.en+' '+it.scenarios.map(s=>s.title).join(' ')+' '+sectionHeaders(it.scenarios)).toLowerCase();
    idx.push({cat:'guidelines', id:it.id, label:it.name, sub:'救護指引 · '+(it.en||''), kw:expandSynonyms(raw)});
  });
  DATA.drugs.forEach(it=>{
    const raw = (it.name+' '+it.en+' '+it.scenarios.map(s=>s.title).join(' ')+' '+sectionHeaders(it.scenarios)).toLowerCase();
    idx.push({cat:'drugs', id:it.id, label:it.name, sub:'救護藥物 · '+(it.en||''), kw:expandSynonyms(raw)});
  });
  DATA.flowcharts.forEach(it=>{
    const sideHeaders = it.sideinfo ? (Array.isArray(it.sideinfo)?it.sideinfo:[it.sideinfo]).map(s=>s.h).join(' ') : '';
    const subHeaders = it.subflow && it.subflow.sideinfo ? [].concat(it.subflow.sideinfo).map(s=>s.h).join(' ') : '';
    const raw = (it.code+' '+it.title+' '+sideHeaders+' '+subHeaders).toLowerCase();
    idx.push({cat:'flowcharts', id:it.id, label:it.code+' '+it.title, sub:'救護流程 · '+DEPT_LABEL[it.dept], kw:expandSynonyms(raw)});
  });
  return idx;
}
const SEARCH_INDEX = flattenSearchIndex();

const MED_DIR_QUERIES = ['md','醫師','醫療指導','醫療指導醫師','medical director','med director','聯絡醫師','醫師聯絡'];

function isMedDirectorQuery(q){
  const ql = q.trim().toLowerCase();
  return MED_DIR_QUERIES.some(k => ql === k.toLowerCase());
}

function medDirectorCallBtn(size){
  const s = size=== 'sm' ? 13 : 15;
  return `<div class="med-director-call" title="尚未設定實際電話（示意用）">
        <svg width="${s}" height="${s}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.362 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.338 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
        撥打
      </div>`;
}

function renderMedDirectorDirectory(q){
  window.scrollTo(0, 0);
  backbar.classList.add('show');
  backlabel.textContent = '清除搜尋';
  state = {view:'search', searchQ:q};
  const entries = Object.entries(MED_DIRECTORS);
  app.innerHTML = `
    <div class="section-title">醫療指導醫師（${entries.length}）</div>
    <div class="legend" style="margin-top:0;margin-bottom:14px;">輸入 <b>md</b>／<b>醫師</b> 可開啟此聯絡目錄；撥打鈕目前為示意，尚未設定實際電話。</div>
    <div class="med-dir-list">
      ${entries.map(([key, name])=>{
        const unit = MED_DIRECTOR_UNIT[key] || '';
        return `
        <div class="med-director med-dir-card">
          <div class="med-director-info">
            <div class="med-director-name">${escapeHtml(name)}</div>
            <div class="med-director-unit">${escapeHtml(unit)}</div>
          </div>
          ${medDirectorCallBtn('md')}
        </div>`;
      }).join('')}
    </div>
  `;
}

function renderSearchResults(q){
  window.scrollTo(0, 0);
  backbar.classList.add('show');
  backlabel.textContent = '清除搜尋';
  state = {view:'search', searchQ:q};
  if(isMedDirectorQuery(q)){
    renderMedDirectorDirectory(q);
    return;
  }
  const results = SEARCH_INDEX.filter(r=> kwMatches(r.kw, q));
  if(results.length===0){
    app.innerHTML = `<div class="empty">找不到符合「${escapeHtml(q)}」的項目<br>試試看其他關鍵字，例如藥物英文名、情境名稱，或輸入 md／醫師 查看醫療指導醫師</div>`;
    return;
  }
  app.innerHTML = `
    <div class="section-title">搜尋結果（${results.length}）</div>
    <div class="item-list">
      ${results.map(r=>`
        <div class="item-card" data-cat="${r.cat}" data-id="${r.id}">
          <div><div class="t">${escapeHtml(r.label)}</div><div class="en">${escapeHtml(r.sub)}</div></div>
          <div class="n">›</div>
        </div>`).join('')}
    </div>
  `;
  app.querySelectorAll('.item-card').forEach(el=>{
    el.addEventListener('click', ()=> renderDetail(el.dataset.cat, el.dataset.id, 0, {fromSearch:true, searchQ:q}));
  });
}

/* ============ NAV EVENTS ============ */
backbar.addEventListener('click', ()=>{
  if(state.view==='search'){ document.getElementById('search').value=''; renderHome(); return; }
  if(state.view==='detail'){
    if(state.fromSearch){
      const q = state.searchQ || document.getElementById('search').value.trim();
      if(q){ renderSearchResults(q); return; }
      document.getElementById('search').value='';
      renderHome();
      return;
    }
    if(state.cat==='flowcharts'){ renderFlowList(state.dept); return; }
    renderList(state.cat); return;
  }
  if(state.view==='flowlist'){ renderFlowDeptMenu(); return; }
  if(state.view==='flowmenu'){ renderHome(); return; }
  if(state.view==='list'){ renderHome(); return; }
  renderHome();
});

const searchInput = document.getElementById('search');
let debounceT;
searchInput.addEventListener('input', (e)=>{
  clearTimeout(debounceT);
  const v = e.target.value.trim();
  debounceT = setTimeout(()=>{
    if(v.length===0){ renderHome(); return; }
    renderSearchResults(v);
  }, 150);
});

renderHome();
</script>
